<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Text Display Generator</title>
<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    padding:40px;
}
.box{
    width:470px;
    background:#161b22;
    padding:25px;
    border-radius:20px;
}
h1{
    text-align:center;
    color:#58a6ff;
}
input,select,button,textarea{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#21262d;
    color:white;
    box-sizing:border-box;
}
input[type="checkbox"]{
    width:auto;
}
label{
    display:block;
    margin-top:10px;
}
button{
    cursor:pointer;
    background:#238636;
    font-weight:bold;
}
.copy{
    background:#1f6feb;
}
.preview{
    margin-top:20px;
    background:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
    font-size:40px;
    word-break:break-word;
}
textarea{
    height:180px;
    color:#7ee787;
    font-family:monospace;
    resize:vertical;
}
.error{
    color:#ff5555;
    font-size:13px;
    margin-top:6px;
    min-height:16px;
}
.hint{
    color:#8b949e;
    font-size:12px;
    margin-top:4px;
}
.batch-row{
    display:flex;
    gap:8px;
    align-items:center;
    margin-top:12px;
}
.batch-row input{
    margin-top:0;
}
.batch-row button{
    width:auto;
    padding:8px 14px;
    margin-top:0;
    flex-shrink:0;
}
#batchList{
    margin-top:10px;
}
.batch-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#21262d;
    padding:8px 10px;
    border-radius:8px;
    margin-top:6px;
    font-size:14px;
}
.batch-item button{
    width:auto;
    padding:4px 10px;
    margin:0;
    background:#da3633;
    font-size:12px;
}
</style>
</head>
<body>
<div class="box">
<h1>Text Display Generator</h1>

<input id="text" value="Common" maxlength="100">
<div class="error" id="textError"></div>

<select id="color">
<option value="white">White</option>
<option value="green" selected>Green</option>
<option value="gold">Gold</option>
<option value="red">Red</option>
<option value="blue">Blue</option>
<option value="yellow">Yellow</option>
</select>

<input id="size" type="number" value="2.1" step="0.1" min="0.1" max="50">
<div class="hint">Scale must be greater than 0</div>

<label>
<input id="bold" type="checkbox" checked>
Bold
</label>
<label>
<input id="shadow" type="checkbox" checked>
Shadow
</label>

<select id="billboard">
<option value="center">Center</option>
<option value="fixed">Fixed</option>
</select>

<select id="mode">
<option value="summon">Summon</option>
<option value="merge">Merge nearest</option>
</select>

<div class="preview" id="preview">Common</div>

<button onclick="generate()">Generate</button>
<button class="copy" onclick="copyCommand()">Copy</button>
<textarea id="output" readonly></textarea>

<div class="batch-row">
<button onclick="addToBatch()" style="width:100%;background:#8957e5;">Add current settings to batch</button>
</div>
<div id="batchList"></div>
<button id="copyAllBtn" class="copy" style="display:none;margin-top:14px;" onclick="copyAllBatch()">Copy all commands</button>
</div>

<script>
const colors={
white:"#ffffff",
green:"#55ff55",
gold:"#ffaa00",
red:"#ff5555",
blue:"#5555ff",
yellow:"#ffff55"
};

let batch = [];

function escapeForJsonAndNbt(str){
    // Escape backslashes first, then double quotes (for the JSON text component),
    // then single quotes (since the whole json string is wrapped in '...' for NBT).
    return str
        .replace(/\\/g, "\\\\")
        .replace(/"/g, '\\"')
        .replace(/'/g, "\\'");
}

function getSize(){
    let raw = Number(document.getElementById("size").value);
    if(!raw || raw <= 0 || isNaN(raw)){
        return null;
    }
    return raw.toFixed(1);
}

function updatePreview(){
    let p = document.getElementById("preview");
    let text = document.getElementById("text").value;
    p.innerText = text || "(empty)";
    p.style.color = colors[document.getElementById("color").value];
    p.style.fontWeight = document.getElementById("bold").checked ? "bold" : "normal";

    let size = Number(document.getElementById("size").value);
    if(size && size > 0){
        // scale preview font relative to the base 40px, capped so it stays on screen
        let px = Math.min(Math.max(40 * (size / 2.1), 14), 120);
        p.style.fontSize = px + "px";
    }

    validateText();
}

function validateText(){
    let text = document.getElementById("text").value;
    let err = document.getElementById("textError");
    if(text.trim() === ""){
        err.innerText = "Text cannot be empty";
        return false;
    }
    err.innerText = "";
    return true;
}

document.querySelectorAll("input,select")
.forEach(e=>{
e.addEventListener("input",updatePreview);
e.addEventListener("change",updatePreview);
});

function buildNbt(){
    if(!validateText()){
        return null;
    }
    let size = getSize();
    if(size === null){
        document.getElementById("textError").innerText = "Size must be a number greater than 0";
        return null;
    }

    let rawText = document.getElementById("text").value;
    let text = escapeForJsonAndNbt(rawText);
    let color = document.getElementById("color").value;

    let jsonExtra = "";
    if(document.getElementById("bold").checked){
        jsonExtra += ',"bold":true';
    }

    let shadow = document.getElementById("shadow").checked ? "1b" : "0b";
    let billboard = document.getElementById("billboard").value;

    return `{text:'{"text":"${text}","color":"${color}"${jsonExtra}}',billboard:"${billboard}",shadow:${shadow},transformation:{translation:[0f,0f,0f],scale:[${size}f,${size}f,${size}f],left_rotation:[0f,0f,0f,1f],right_rotation:[0f,0f,0f,1f]}}`;
}

function buildCommand(nbt){
    let mode = document.getElementById("mode").value;
    if(mode === "summon"){
        return `/summon minecraft:text_display ~ ~ ~ ${nbt}`;
    }
    return `/data merge entity @e[type=minecraft:text_display,sort=nearest,limit=1] ${nbt}`;
}

function generate(){
    let nbt = buildNbt();
    if(nbt === null){
        document.getElementById("output").value = "";
        return;
    }
    document.getElementById("output").value = buildCommand(nbt);
}

function copyCommand(){
    let val = document.getElementById("output").value;
    if(!val){
        generate();
        val = document.getElementById("output").value;
    }
    if(!val) return;
    navigator.clipboard.writeText(val);
}

function addToBatch(){
    let nbt = buildNbt();
    if(nbt === null) return;
    let command = buildCommand(nbt);
    let label = document.getElementById("text").value;
    batch.push({label, command});
    renderBatch();
}

function removeFromBatch(index){
    batch.splice(index, 1);
    renderBatch();
}

function renderBatch(){
    let list = document.getElementById("batchList");
    list.innerHTML = "";
    batch.forEach((item, i) => {
        let row = document.createElement("div");
        row.className = "batch-item";
        let span = document.createElement("span");
        span.innerText = item.label;
        let btn = document.createElement("button");
        btn.innerText = "Remove";
        btn.onclick = () => removeFromBatch(i);
        row.appendChild(span);
        row.appendChild(btn);
        list.appendChild(row);
    });
    document.getElementById("copyAllBtn").style.display = batch.length ? "block" : "none";
}

function copyAllBatch(){
    let all = batch.map(item => item.command).join("\n");
    navigator.clipboard.writeText(all);
}

updatePreview();
</script>
</body>
</html>
