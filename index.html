<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Text Display Generator</title>
<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    padding:40px;
}
.box{
    width:520px;
    background:#161b22;
    padding:25px;
    border-radius:20px;
}
h1{
    text-align:center;
    color:#58a6ff;
}
input,select,button,textarea{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#21262d;
    color:white;
    box-sizing:border-box;
}
input[type="checkbox"]{ width:auto; }
label{ display:block; margin-top:10px; }
button{
    cursor:pointer;
    background:#238636;
    font-weight:bold;
}
.copy{ background:#1f6feb; }
.preview{
    margin-top:20px;
    background:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
    font-size:40px;
    word-break:break-word;
    min-height:60px;
}
textarea{
    height:220px;
    color:#7ee787;
    font-family:monospace;
    resize:vertical;
    white-space:pre-wrap;
}
.error{
    color:#ff5555;
    font-size:13px;
    margin-top:6px;
    min-height:16px;
}
.hint{
    color:#8b949e;
    font-size:12px;
    margin-top:4px;
}
.batch-row{
    display:flex;
    gap:8px;
    align-items:center;
    margin-top:12px;
}
.batch-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#21262d;
    padding:8px 10px;
    border-radius:8px;
    margin-top:6px;
    font-size:14px;
}
.batch-item button{
    width:auto;
    padding:4px 10px;
    margin:0;
    background:#da3633;
    font-size:12px;
}
</style>
</head>
<body>
<div class="box">
<h1>Text Display Generator</h1>

<input id="text" value="Common" maxlength="200">
<div class="error" id="textError"></div>

<select id="color">
    <option value="white">White</option>
    <option value="green" selected>Green</option>
    <option value="gold">Gold</option>
    <option value="red">Red</option>
    <option value="blue">Blue</option>
    <option value="yellow">Yellow</option>
    <option value="light_purple">Light Purple</option>
    <option value="dark_green">Dark Green</option>
</select>

<input id="size" type="number" value="2.1" step="0.1" min="0.1" max="50">
<div class="hint">Scale (recommended 1.0 – 4.0)</div>

<label><input id="bold" type="checkbox" checked> Bold</label>
<label><input id="shadow" type="checkbox" checked> Shadow</label>

<select id="billboard">
    <option value="center">Center</option>
    <option value="fixed">Fixed</option>
    <option value="vertical">Vertical</option>
</select>

<select id="mode">
    <option value="summon">Summon</option>
    <option value="merge" selected>Merge nearest</option>
</select>

<div class="preview" id="preview">Common</div>

<button onclick="generate()">Generate Command</button>
<button class="copy" onclick="copyCommand()">Copy Command</button>

<textarea id="output" readonly></textarea>

<div class="batch-row">
    <button onclick="addToBatch()" style="width:100%;background:#8957e5;">Add to Batch</button>
</div>
<div id="batchList"></div>
<button id="copyAllBtn" class="copy" style="display:none;margin-top:14px;" onclick="copyAllBatch()">Copy All Commands</button>
</div>

<script>
const colors = {
    white: "#ffffff", green: "#55ff55", gold: "#ffaa00", red: "#ff5555",
    blue: "#5555ff", yellow: "#ffff55", light_purple: "#ff55ff", dark_green: "#00aa00"
};

let batch = [];

function escapeForJsonAndNbt(str) {
    return str
        .replace(/\\/g, "\\\\")
        .replace(/"/g, '\\"')
        .replace(/'/g, "\\'");
}

function getSize() {
    let raw = Number(document.getElementById("size").value);
    return (raw && raw > 0 && !isNaN(raw)) ? raw.toFixed(2) : null;
}

function updatePreview() {
    const p = document.getElementById("preview");
    const text = document.getElementById("text").value.trim();
    p.innerText = text || "(empty)";
    p.style.color = colors[document.getElementById("color").value];
    p.style.fontWeight = document.getElementById("bold").checked ? "bold" : "normal";
    
    let size = Number(document.getElementById("size").value);
    if (size > 0) {
        let px = Math.min(Math.max(40 * (size / 2.1), 14), 140);
        p.style.fontSize = px + "px";
    }
}

function buildNbt() {
    const textEl = document.getElementById("text");
    if (!textEl.value.trim()) {
        document.getElementById("textError").innerText = "Text cannot be empty";
        return null;
    }
    document.getElementById("textError").innerText = "";

    const size = getSize();
    if (!size) return null;

    const rawText = textEl.value;
    const escapedText = escapeForJsonAndNbt(rawText);
    const color = document.getElementById("color").value;
    const bold = document.getElementById("bold").checked ? ',"bold":true' : '';
    const shadow = document.getElementById("shadow").checked ? "1b" : "0b";
    const billboard = document.getElementById("billboard").value;

    return `{text:'{"text":"${escapedText}","color":"${color}"${bold}}',billboard:"${billboard}",shadow:${shadow},transformation:{translation:[0f,0.5f,0f],scale:[${size}f,${size}f,${size}f],left_rotation:[0f,0f,0f,1f],right_rotation:[0f,0f,0f,1f]}}`;
}

function buildCommand(nbt) {
    return document.getElementById("mode").value === "summon"
        ? `/summon minecraft:text_display ~ ~ ~ ${nbt}`
        : `/data merge entity @e[type=minecraft:text_display,sort=nearest,limit=1] ${nbt}`;
}

function generate() {
    const nbt = buildNbt();
    if (!nbt) return;
    document.getElementById("output").value = buildCommand(nbt);
}

function copyCommand() {
    const output = document.getElementById("output");
    if (!output.value) generate();
    navigator.clipboard.writeText(output.value);
}

function addToBatch() {
    const nbt = buildNbt();
    if (!nbt) return;
    const command = buildCommand(nbt);
    const label = document.getElementById("text").value.trim() || "Unnamed";
    batch.push({label, command});
    renderBatch();
}

function removeFromBatch(index) {
    batch.splice(index, 1);
    renderBatch();
}

function renderBatch() {
    const list = document.getElementById("batchList");
    list.innerHTML = "";
    batch.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "batch-item";
        row.innerHTML = `
            <span>${item.label}</span>
            <button onclick="removeFromBatch(${i})">Remove</button>
        `;
        list.appendChild(row);
    });
    document.getElementById("copyAllBtn").style.display = batch.length ? "block" : "none";
}

function copyAllBatch() {
    const all = batch.map(item => item.command).join("\n");
    navigator.clipboard.writeText(all);
}

// Event listeners
document.querySelectorAll("input,select").forEach(el => {
    el.addEventListener("input", updatePreview);
    el.addEventListener("change", updatePreview);
});

updatePreview();
</script>
</body>
</html>
