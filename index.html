<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Text Display Generator - 1.21.11</title>
<style>
    body { background:#0d1117; color:white; font-family:Arial,sans-serif; display:flex; justify-content:center; padding:40px; }
    .box { width:540px; background:#161b22; padding:25px; border-radius:20px; }
    h1 { text-align:center; color:#58a6ff; }
    input, select, button, textarea { 
        width:100%; margin-top:12px; padding:12px; border-radius:10px; 
        border:none; background:#21262d; color:white; box-sizing:border-box; 
    }
    input[type="checkbox"] { width:auto; }
    label { display:block; margin-top:10px; }
    button { cursor:pointer; background:#238636; font-weight:bold; }
    .copy { background:#1f6feb; }
    .preview { 
        margin-top:20px; background:black; padding:25px; border-radius:12px; 
        text-align:center; font-size:40px; word-break:break-word; min-height:70px; 
    }
    textarea { height:260px; color:#7ee787; font-family:monospace; resize:vertical; }
    .error { color:#ff5555; font-size:13px; margin-top:6px; min-height:20px; }
    .note { color:#ffaa00; font-size:14px; }
</style>
</head>
<body>
<div class="box">
    <h1>Text Display Generator (1.21.11)</h1>
    <p class="note">Full Colors • Position: ~ ~ ~</p>

    <input id="text" value="Common" maxlength="200">
    <div class="error" id="textError"></div>

    <select id="color">
        <option value="white">White</option>
        <option value="green" selected>Green</option>
        <option value="dark_green">Dark Green</option>
        <option value="gold">Gold</option>
        <option value="yellow">Yellow</option>
        <option value="red">Red</option>
        <option value="dark_red">Dark Red</option>
        <option value="blue">Blue</option>
        <option value="dark_blue">Dark Blue</option>
        <option value="light_purple">Light Purple</option>
        <option value="dark_purple">Dark Purple</option>
        <option value="aqua">Aqua</option>
        <option value="dark_aqua">Dark Aqua</option>
        <option value="gray">Gray</option>
        <option value="dark_gray">Dark Gray</option>
        <option value="black">Black</option>
    </select>

    <input id="size" type="number" value="2.0" step="0.1" min="0.1" max="10">
    <label><input id="bold" type="checkbox" checked> Bold</label>
    <label><input id="shadow" type="checkbox" checked> Shadow</label>

    <select id="billboard">
        <option value="center">Center</option>
        <option value="fixed">Fixed</option>
        <option value="vertical">Vertical</option>
    </select>

    <select id="mode">
        <option value="summon" selected>Summon</option>
        <option value="merge">Merge nearest</option>
    </select>

    <div class="preview" id="preview">Common</div>

    <button onclick="generate()">Generate Command</button>
    <button class="copy" onclick="copyCommand()">Copy Command</button>

    <textarea id="output" readonly></textarea>
</div>

<script>
function buildNbt() {
    const raw = document.getElementById("text").value.trim();
    if (!raw) {
        document.getElementById("textError").innerText = "Text cannot be empty";
        return null;
    }
    document.getElementById("textError").innerText = "";

    const color = document.getElementById("color").value;
    const bold = document.getElementById("bold").checked;
    const shadow = document.getElementById("shadow").checked ? "1b" : "0b";
    const billboard = document.getElementById("billboard").value;
    const size = parseFloat(document.getElementById("size").value) || 2.0;

    let textNbt = `{text:"${raw.replace(/\\/g,'\\\\').replace(/"/g,'\\"')}",color:"${color}"`;
    if (bold) textNbt += ",bold:true";
    textNbt += "}";

    return `{text:${textNbt},billboard:"${billboard}",shadow:${shadow},transformation:{translation:[0f,0.5f,0f],scale:[${size}f,${size}f,${size}f]}}`;
}

function buildCommand(nbt) {
    return document.getElementById("mode").value === "summon"
        ? `/summon minecraft:text_display ~ ~ ~ ${nbt}`   // Changed to ~ ~ ~
        : `/data merge entity @e[type=minecraft:text_display,sort=nearest,limit=1] ${nbt}`;
}

function generate() {
    const nbt = buildNbt();
    if (nbt) document.getElementById("output").value = buildCommand(nbt);
}

function copyCommand() {
    const output = document.getElementById("output");
    if (!output.value) generate();
    navigator.clipboard.writeText(output.value);
}

// Live preview
document.querySelectorAll("input, select").forEach(e => {
    e.addEventListener("input", () => {
        document.getElementById("preview").innerText = document.getElementById("text").value || "(empty)";
    });
});

generate();
</script>
</body>
</html>
