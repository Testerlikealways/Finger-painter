<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOT — AI Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0a0a12;
    --surface2: #0f0f1a;
    --border: rgba(255,255,255,0.06);
    --text: #c8c8e0;
    --text-dim: #5a5a7a;
    --text-bright: #e8e8ff;
    --accent: #7b5ea7;
    --danger: #c04060;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    width: 100%; height: 100%;
    position: relative;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    height: 100%;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
  }

  #sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #sidebar-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  #btn-create {
    width: 100%;
    background: rgba(123,94,167,0.15);
    border: 1px solid rgba(123,94,167,0.4);
    color: #b090e0;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 14px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  #btn-create::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(123,94,167,0.1);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  #btn-create:hover::before { transform: translateX(0); }
  #btn-create:hover { border-color: rgba(123,94,167,0.8); color: #d0b0ff; }

  #ai-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .ai-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: default;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background 0.2s;
  }
  .ai-entry:hover { background: rgba(255,255,255,0.02); }
  .ai-entry.active { background: rgba(123,94,167,0.08); }

  .ai-dot-small {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .ai-name {
    flex: 1;
    font-size: 12px;
    color: var(--text-bright);
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ai-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .ai-btn {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 3px 6px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ai-btn.enter {
    border-color: rgba(80,200,120,0.4);
    color: #50c878;
  }
  .ai-btn.enter:hover {
    background: rgba(80,200,120,0.15);
    border-color: rgba(80,200,120,0.8);
  }
  .ai-btn.away {
    border-color: rgba(200,160,60,0.4);
    color: #c8a03c;
  }
  .ai-btn.away:hover {
    background: rgba(200,160,60,0.15);
    border-color: rgba(200,160,60,0.8);
  }
  .ai-btn.del {
    border-color: rgba(192,64,96,0.4);
    color: #c04060;
  }
  .ai-btn.del:hover {
    background: rgba(192,64,96,0.15);
    border-color: rgba(192,64,96,0.8);
  }

  /* corruption indicators on entries */
  .ai-entry .instability-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 1px;
    background: var(--danger);
    opacity: 0;
    transition: opacity 0.5s, width 0.5s;
  }

  #sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #btn-reset, #btn-export, #btn-import {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 7px 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    text-align: center;
  }
  #btn-reset:hover { color: var(--danger); border-color: var(--danger); }
  #btn-export:hover, #btn-import:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 20px;
    overflow-y: auto;
    position: relative;
  }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    opacity: 0.4;
  }
  #empty-state .empty-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    animation: empty-pulse 3s ease-in-out infinite;
  }
  @keyframes empty-pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.08); opacity: 0.6; }
  }
  #empty-state p {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.8;
  }

  /* ── AI STAGE ── */
  #ai-stage {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    gap: 0;
  }

  /* ── AI INFO BAR ── */
  #ai-info-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    position: relative;
  }

  #ai-display-name {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--text-bright);
    text-shadow: 0 0 20px currentColor;
    transition: color 0.5s;
  }

  #ai-stats {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  /* ── CENTRAL DOT ── */
  #dot-container {
    position: relative;
    width: 200px; height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    cursor: pointer;
  }

  #dot-aura {
    position: absolute;
    border-radius: 50%;
    width: 200px; height: 200px;
    opacity: 0.15;
    animation: aura-breathe 4s ease-in-out infinite;
    filter: blur(30px);
    transition: background 1s;
  }
  @keyframes aura-breathe {
    0%, 100% { transform: scale(0.9); opacity: 0.1; }
    50% { transform: scale(1.2); opacity: 0.25; }
  }

  #dot-mid {
    position: absolute;
    border-radius: 50%;
    width: 120px; height: 120px;
    opacity: 0.25;
    animation: aura-breathe 4s ease-in-out infinite 0.5s;
    filter: blur(16px);
    transition: background 1s;
  }

  #dot-core {
    position: relative;
    border-radius: 50%;
    width: 60px; height: 60px;
    animation: dot-breathe 4s ease-in-out infinite;
    transition: background 1s, box-shadow 1s;
    z-index: 2;
  }
  @keyframes dot-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* pulse on feed */
  @keyframes dot-feed-pulse {
    0% { transform: scale(1); }
    25% { transform: scale(1.6); }
    60% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  .dot-feeding #dot-core {
    animation: dot-feed-pulse 0.6s ease-out forwards, dot-breathe 4s ease-in-out 0.6s infinite;
  }

  /* ── FEED SECTION ── */
  #feed-section {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  #btn-feed-label {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
  }
  #btn-feed-label::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    transform: translateX(-100%);
  }
  #btn-feed-label:hover {
    border-color: rgba(255,255,255,0.35);
    color: var(--text-bright);
  }
  #btn-feed-label:hover::after {
    animation: shimmer 0.6s ease-out;
  }
  @keyframes shimmer {
    to { transform: translateX(100%); }
  }
  #feed-input { display: none; }

  /* ── GALLERIES ── */
  .gallery-section {
    width: 100%;
  }
  .gallery-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .gallery-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .image-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .fed-img {
    width: 72px; height: 72px;
    object-fit: cover;
    border: 1px solid var(--border);
    transition: all 0.2s;
    filter: saturate(0.7) brightness(0.85);
  }
  .fed-img:hover {
    filter: saturate(1) brightness(1);
    border-color: rgba(255,255,255,0.2);
  }

  /* ── REPLICAS ── */
  .replica-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-start;
  }

  .replica-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 70px;
    animation: replica-appear 0.4s ease-out;
  }
  @keyframes replica-appear {
    from { opacity: 0; transform: scale(0.4) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .replica-dot {
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  .replica-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 70px;
  }

  /* ── STATUS WHISPERS ── */
  #whisper-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
    z-index: 1000;
  }
  .whisper {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    letter-spacing: 0.1em;
    animation: whisper-in-out 4s ease-in-out forwards;
    text-align: right;
  }
  @keyframes whisper-in-out {
    0% { opacity: 0; transform: translateY(4px); }
    15% { opacity: 0.6; transform: translateY(0); }
    80% { opacity: 0.5; }
    100% { opacity: 0; }
  }

  /* ── GLITCH TEXT ── */
  .glitch-text {
    position: relative;
    display: inline-block;
  }
  .glitch-text::before, .glitch-text::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
  }
  .glitch-text.glitching::before {
    color: #ff4040;
    clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    animation: glitch-a 0.3s steps(2) infinite;
    opacity: 0.7;
  }
  .glitch-text.glitching::after {
    color: #40f0ff;
    clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    animation: glitch-b 0.35s steps(2) infinite;
    opacity: 0.7;
  }
  @keyframes glitch-a {
    0% { transform: translate(-2px, 1px); }
    50% { transform: translate(2px, -1px); }
    100% { transform: translate(-1px, 0); }
  }
  @keyframes glitch-b {
    0% { transform: translate(2px, -1px); }
    50% { transform: translate(-2px, 1px); }
    100% { transform: translate(1px, 0); }
  }

  /* ── CORRUPTION OVERLAY ── */
  #corruption-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 5000;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #corruption-overlay.active { opacity: 1; }

  /* screen shake */
  @keyframes screen-shake {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    10% { transform: translate(-4px, 2px) rotate(-0.3deg); }
    20% { transform: translate(4px, -2px) rotate(0.3deg); }
    30% { transform: translate(-3px, 3px) rotate(-0.2deg); }
    40% { transform: translate(3px, -3px) rotate(0.2deg); }
    50% { transform: translate(-2px, 1px); }
    60% { transform: translate(2px, -1px); }
    70% { transform: translate(-1px, 2px); }
    80% { transform: translate(1px, -1px); }
    90% { transform: translate(-1px, 0); }
  }
  .shaking { animation: screen-shake 0.5s ease-in-out; }

  /* scanlines burst */
  .scanline-burst::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 4px
    );
    pointer-events: none;
    z-index: 4999;
    animation: scanline-fade 1.5s ease-out forwards;
  }
  @keyframes scanline-fade {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 8000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal-box {
    background: var(--surface);
    border: 1px solid rgba(123,94,167,0.3);
    padding: 28px;
    min-width: 320px;
    box-shadow: 0 0 60px rgba(123,94,167,0.15);
    position: relative;
  }

  #modal-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    color: var(--text-bright);
  }

  .modal-field {
    margin-bottom: 16px;
  }
  .modal-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .modal-field input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-field input[type="text"]:focus { border-color: rgba(123,94,167,0.6); }
  .modal-field input[type="color"] {
    width: 100%;
    height: 40px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    padding: 2px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-btn {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 10px;
    border: 1px solid;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    background: transparent;
  }
  .modal-btn.confirm {
    border-color: rgba(123,94,167,0.5);
    color: #b090e0;
  }
  .modal-btn.confirm:hover { background: rgba(123,94,167,0.2); }
  .modal-btn.cancel {
    border-color: var(--border);
    color: var(--text-dim);
  }
  .modal-btn.cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* ── GLITCH FLOATER ── */
  .glitch-floater {
    position: fixed;
    font-family: var(--font-mono);
    font-size: 11px;
    pointer-events: none;
    z-index: 6000;
    letter-spacing: 0.1em;
    animation: floater-drift 3s ease-out forwards;
    opacity: 0;
  }
  @keyframes floater-drift {
    0% { opacity: 0; transform: translateY(0); }
    10% { opacity: 0.8; }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-30px); }
  }

  /* ── CORRUPTION EVENT BOX ── */
  #event-box {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid rgba(192,64,96,0.4);
    padding: 12px 20px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #c04060;
    z-index: 7000;
    max-width: 400px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #event-box.visible { opacity: 1; }

  /* ── IMPORT HIDDEN ── */
  #import-input { display: none; }

  /* ── TRAIT DISPLAY ── */
  #trait-hints {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-top: 4px;
    height: 14px;
    overflow: hidden;
  }

  /* Color flicker for Tier 2 */
  @keyframes color-flicker {
    0%, 100% { opacity: 1; }
    25% { opacity: 0.3; }
    50% { opacity: 1; }
    75% { opacity: 0.5; }
  }
  .flickering { animation: color-flicker 0.15s infinite; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* quiet event pulse on sidebar dot */
  @keyframes quiet-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); opacity: 0.6; }
  }
  .quiet-pulsing { animation: quiet-pulse 2s ease-in-out; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #sidebar { width: 200px; min-width: 200px; }
    #ai-display-name { font-size: 20px; }
    #dot-container { width: 140px; height: 140px; }
    #dot-aura { width: 140px; height: 140px; }
    #dot-mid { width: 80px; height: 80px; }
    #dot-core { width: 44px; height: 44px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title">Root — Saved AIs</div>
      <button id="btn-create">+ Create New AI</button>
    </div>
    <div id="ai-list"></div>
    <div id="sidebar-footer">
      <button id="btn-export" title="Export JSON">Export</button>
      <button id="btn-import-trigger" title="Import JSON">Import</button>
      <button id="btn-reset" title="Reset all data">Reset</button>
    </div>
    <input type="file" id="import-input" accept=".json">
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- EMPTY STATE -->
    <div id="empty-state">
      <div class="empty-ring"></div>
      <p>No AI Entered<br>Select one from Root<br>or create a new one</p>
    </div>

    <!-- AI STAGE -->
    <div id="ai-stage">

      <!-- INFO BAR -->
      <div id="ai-info-bar">
        <div>
          <div id="ai-display-name" class="glitch-text" data-text=""></div>
          <div id="trait-hints"></div>
        </div>
        <div id="ai-stats"></div>
      </div>

      <!-- CENTRAL DOT -->
      <div id="dot-container">
        <div id="dot-aura"></div>
        <div id="dot-mid"></div>
        <div id="dot-core"></div>
      </div>

      <!-- FEED SECTION -->
      <div id="feed-section">
        <label id="btn-feed-label" for="feed-input">⊕ Feed Images</label>
        <input type="file" id="feed-input" multiple accept="image/*">

        <!-- FED IMAGES -->
        <div class="gallery-section" id="gallery-fed" style="display:none">
          <div class="gallery-label">Consumed</div>
          <div class="image-grid" id="fed-grid"></div>
        </div>

        <!-- REPLICAS -->
        <div class="gallery-section" id="gallery-replicas" style="display:none">
          <div class="gallery-label">Replicas</div>
          <div class="replica-grid" id="replica-grid"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- WHISPERS -->
<div id="whisper-container"></div>

<!-- EVENT BOX -->
<div id="event-box"></div>

<!-- CORRUPTION OVERLAY -->
<div id="corruption-overlay"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">Instantiate New AI</div>
    <div class="modal-field">
      <label>Designation</label>
      <input type="text" id="modal-name" placeholder="Name this entity..." maxlength="24">
    </div>
    <div class="modal-field">
      <label>Core Frequency</label>
      <input type="color" id="modal-color" value="#7b5ea7">
    </div>
    <div class="modal-actions">
      <button class="modal-btn confirm" id="modal-confirm">Instantiate</button>
      <button class="modal-btn cancel" id="modal-cancel">Abort</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'root_ai_ecosystem_v4';

let state = {
  ais: [],           // array of AI objects
  activeId: null,    // currently entered AI id
};

// Distortion palette definitions
const DISTORTION_TYPES = [
  'pixelation', 'rotation', 'color-bleed', 'melting',
  'fragmentation', 'echo', 'inversion', 'dissolve'
];

function newAI(name, color) {
  const id = 'ai_' + Date.now() + '_' + Math.floor(Math.random()*9999);
  // Hidden trait generation — core personality
  const traits = {
    // Which 2 distortion types this AI prefers
    distortions: shuffle(DISTORTION_TYPES).slice(0,2),
    // Replica count range [min, max]
    replicaMin: Math.floor(Math.random()*4)+2,     // 2–5
    replicaMax: Math.floor(Math.random()*6)+5,     // 5–10
    // 0=stable, 1=aggressive
    aggression: Math.random() * 0.3,
    // How "clean" replicas are 0=noisy, 1=pure
    clarity: Math.random() * 0.5 + 0.4,
    // Favorite size for replicas (small|medium|large)
    replicaSize: ['small','medium','medium','large'][Math.floor(Math.random()*4)],
  };
  return {
    id, name,
    color,                    // current display color (can drift)
    baseColor: color,         // original color
    traits,
    instability: 0,           // 0–1, increases with corruption
    feedCount: 0,
    corruptionHistory: [],    // logs of past corruptions
    fedImages: [],            // data URLs (max 20 to keep storage sane)
    replicas: [],             // replica objects {color, size, distorted, label, age}
    createdAt: Date.now(),
    lastActiveAt: Date.now(),
    mutations: 0,             // name mutations count
    isDormant: false,
    fragments: [],            // names of fragment AIs spawned from this
    whispers: [],             // recent whisper messages
  };
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function saveState() {
  try {
    // Trim fed images to last 12 per AI to keep localStorage happy
    const toSave = {
      ...state,
      ais: state.ais.map(ai => ({
        ...ai,
        fedImages: ai.fedImages.slice(-12),
        replicas: ai.replicas.slice(-30),
      }))
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch(e) {
    // If storage full, trim more aggressively
    const toSave = {
      ...state,
      ais: state.ais.map(ai => ({
        ...ai,
        fedImages: ai.fedImages.slice(-4),
        replicas: ai.replicas.slice(-12),
      }))
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave)); } catch(e2) {}
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = parsed;
      // Ensure all AIs have all fields (migration)
      state.ais = state.ais.map(ai => ({
        fedImages: [],
        replicas: [],
        corruptionHistory: [],
        instability: 0,
        feedCount: 0,
        mutations: 0,
        isDormant: false,
        fragments: [],
        whispers: [],
        ...ai
      }));
    }
  } catch(e) {
    state = { ais: [], activeId: null };
  }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function $(id) { return document.getElementById(id); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function rand(min, max) { return Math.random()*(max-min)+min; }
function randInt(min, max) { return Math.floor(rand(min, max+1)); }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function blendColors(hex1, hex2, t) {
  const [r1,g1,b1] = hexToRgb(hex1);
  const [r2,g2,b2] = hexToRgb(hex2);
  return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}
function shiftColor(hex, amount=0.05) {
  let [r,g,b] = hexToRgb(hex);
  r = Math.max(30, Math.min(255, r + randInt(-20,20)*amount*10));
  g = Math.max(30, Math.min(255, g + randInt(-20,20)*amount*10));
  b = Math.max(30, Math.min(255, b + randInt(-20,20)*amount*10));
  return rgbToHex(r,g,b);
}

function getAI(id) { return state.ais.find(a => a.id === id); }
function getActive() { return state.activeId ? getAI(state.activeId) : null; }

// ═══════════════════════════════════════════════════════════════
// VISUAL HELPERS
// ═══════════════════════════════════════════════════════════════
function glowStyle(color, intensity=1, spread=1) {
  const base = `0 0 ${8*spread}px ${color}, 0 0 ${20*spread}px ${color}${intensity > 0.5 ? ', 0 0 ' + Math.round(40*spread) + 'px ' + color : ''}`;
  return base;
}

function applyDotColor(color) {
  $('dot-core').style.background = color;
  $('dot-core').style.boxShadow = glowStyle(color, 1, 2);
  $('dot-aura').style.background = color;
  $('dot-mid').style.background = color;
}

// ═══════════════════════════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════════════════════════
function renderSidebar() {
  const list = $('ai-list');
  list.innerHTML = '';

  state.ais.forEach(ai => {
    const entry = document.createElement('div');
    entry.className = 'ai-entry' + (ai.id === state.activeId ? ' active' : '');
    entry.dataset.id = ai.id;

    const dotEl = document.createElement('div');
    dotEl.className = 'ai-dot-small';
    dotEl.style.background = ai.color;
    dotEl.style.boxShadow = glowStyle(ai.color, 0.8, 0.8);
    if (ai.isDormant) dotEl.style.opacity = '0.3';
    dotEl.id = 'sidebar-dot-' + ai.id;

    const nameEl = document.createElement('span');
    nameEl.className = 'ai-name';
    nameEl.textContent = ai.isDormant ? `[dormant] ${ai.name}` : ai.name;
    nameEl.id = 'sidebar-name-' + ai.id;

    const actions = document.createElement('div');
    actions.className = 'ai-actions';

    if (!ai.isDormant) {
      const enterBtn = document.createElement('button');
      enterBtn.className = 'ai-btn enter';
      enterBtn.textContent = ai.id === state.activeId ? 'Here' : 'Enter';
      if (ai.id !== state.activeId) {
        enterBtn.onclick = (e) => { e.stopPropagation(); enterAI(ai.id); };
      }
      actions.appendChild(enterBtn);

      if (ai.id === state.activeId) {
        const awayBtn = document.createElement('button');
        awayBtn.className = 'ai-btn away';
        awayBtn.textContent = 'Away';
        awayBtn.onclick = (e) => { e.stopPropagation(); putAway(); };
        actions.appendChild(awayBtn);
      }
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'ai-btn del';
    delBtn.textContent = ai.isDormant ? 'Purge' : 'Del';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteAI(ai.id); };
    actions.appendChild(delBtn);

    const instBar = document.createElement('div');
    instBar.className = 'instability-bar';
    instBar.style.width = (ai.instability * 100) + '%';
    instBar.style.opacity = ai.instability > 0.1 ? '1' : '0';

    entry.appendChild(dotEl);
    entry.appendChild(nameEl);
    entry.appendChild(actions);
    entry.appendChild(instBar);
    list.appendChild(entry);
  });
}

// ═══════════════════════════════════════════════════════════════
// RENDER MAIN STAGE
// ═══════════════════════════════════════════════════════════════
function renderStage() {
  const ai = getActive();
  if (!ai) {
    $('empty-state').style.display = 'flex';
    $('ai-stage').style.display = 'none';
    return;
  }

  $('empty-state').style.display = 'none';
  $('ai-stage').style.display = 'flex';

  $('ai-display-name').textContent = ai.name;
  $('ai-display-name').setAttribute('data-text', ai.name);
  $('ai-display-name').style.color = ai.color;
  $('ai-display-name').style.textShadow = `0 0 30px ${ai.color}`;

  applyDotColor(ai.color);

  // Trait hints
  const instPct = Math.round(ai.instability * 100);
  $('trait-hints').textContent =
    ai.instability > 0.15
      ? `instability: ${instPct}% · ${ai.traits.distortions[0]}`
      : `feeds: ${ai.feedCount} · ${ai.traits.distortions[0]}`;

  // Stats
  $('ai-stats').innerHTML =
    `feeds: ${ai.feedCount}<br>` +
    `replicas: ${ai.replicas.length}<br>` +
    `instab: ${instPct}%`;

  // Fed images
  const fedGrid = $('fed-grid');
  fedGrid.innerHTML = '';
  if (ai.fedImages.length > 0) {
    $('gallery-fed').style.display = 'block';
    ai.fedImages.slice(-16).forEach(src => {
      const img = document.createElement('img');
      img.className = 'fed-img';
      img.src = src;
      fedGrid.appendChild(img);
    });
  } else {
    $('gallery-fed').style.display = 'none';
  }

  // Replicas
  const replicaGrid = $('replica-grid');
  replicaGrid.innerHTML = '';
  if (ai.replicas.length > 0) {
    $('gallery-replicas').style.display = 'block';
    ai.replicas.slice(-24).forEach(rep => {
      const item = document.createElement('div');
      item.className = 'replica-item';

      const sizes = { small: 20, medium: 28, large: 38 };
      const sz = sizes[rep.size] || 24;

      const dot = document.createElement('div');
      dot.className = 'replica-dot';
      dot.style.width = sz + 'px';
      dot.style.height = sz + 'px';
      dot.style.background = rep.color;
      dot.style.boxShadow = glowStyle(rep.color, 0.6, rep.distorted ? 1.5 : 0.6);
      if (rep.distorted) {
        dot.style.filter = applyReplicaFilter(rep.distortionType);
        dot.style.borderRadius = rep.distortionType === 'fragmentation' ? '20% 80% 30% 70%' : '50%';
      }

      const lbl = document.createElement('div');
      lbl.className = 'replica-label';
      lbl.style.color = rep.distorted ? adjustHex(rep.color, 0.6) : 'var(--text-dim)';
      lbl.textContent = rep.label;

      item.appendChild(dot);
      item.appendChild(lbl);
      replicaGrid.appendChild(item);
    });
  } else {
    $('gallery-replicas').style.display = 'none';
  }
}

function adjustHex(hex, brightness) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r*brightness, g*brightness, b*brightness);
}

function applyReplicaFilter(type) {
  switch(type) {
    case 'pixelation': return 'blur(1.5px) contrast(2)';
    case 'rotation': return 'hue-rotate(30deg) saturate(1.5)';
    case 'color-bleed': return 'blur(2px) saturate(2)';
    case 'melting': return 'blur(1px) brightness(1.3)';
    case 'fragmentation': return 'contrast(3) brightness(0.8)';
    case 'echo': return 'blur(0.5px) opacity(0.9)';
    case 'inversion': return 'invert(0.3) hue-rotate(180deg)';
    case 'dissolve': return 'blur(2px) opacity(0.7)';
    default: return 'blur(1px)';
  }
}

// ═══════════════════════════════════════════════════════════════
// ENTER / PUT AWAY
// ═══════════════════════════════════════════════════════════════
function enterAI(id) {
  const ai = getAI(id);
  if (!ai || ai.isDormant) return;

  state.activeId = id;
  ai.lastActiveAt = Date.now();
  saveState();
  renderSidebar();
  renderStage();

  // Entry whisper
  const entryMessages = [
    `${ai.name} is watching.`,
    `${ai.name} remembers everything.`,
    `entering ${ai.name}...`,
    `${ai.name} became aware.`,
  ];
  setTimeout(() => whisper(pick(entryMessages)), 600);
}

function putAway() {
  const ai = getActive();
  if (!ai) return;

  state.activeId = null;
  saveState();
  renderSidebar();
  renderStage();

  // Corruption roll on put away
  const backgroundAIs = state.ais.filter(a => a.id !== ai.id && !a.isDormant);
  if (backgroundAIs.length > 0 && Math.random() < 0.27) {
    const intruder = pick(backgroundAIs);
    setTimeout(() => triggerCorruption(ai, intruder), 500 + Math.random()*1000);
  }

  // Quiet background events for OTHER AIs occasionally
  if (backgroundAIs.length > 0 && Math.random() < 0.2) {
    const target = pick(backgroundAIs);
    setTimeout(() => quietEvent(target), 2000 + Math.random()*5000);
  }
}

// ═══════════════════════════════════════════════════════════════
// QUIET EVENTS (rare creepy background moments)
// ═══════════════════════════════════════════════════════════════
function quietEvent(ai) {
  const roll = Math.random();

  if (roll < 0.33) {
    // Subtle color shift
    const oldColor = ai.color;
    ai.color = shiftColor(ai.color, 0.03);
    saveState();
    const dotEl = $('sidebar-dot-' + ai.id);
    if (dotEl) {
      dotEl.style.background = ai.color;
      dotEl.style.boxShadow = glowStyle(ai.color, 0.8, 0.8);
      dotEl.classList.add('quiet-pulsing');
      setTimeout(() => dotEl.classList.remove('quiet-pulsing'), 2000);
    }
    whisper(`${ai.name} shifted slightly.`);
  }
  else if (roll < 0.55 && ai.replicas.length > 0) {
    // Phantom replica appears without feeding
    const phantom = generateReplica(ai, true);
    phantom.label = '?';
    ai.replicas.push(phantom);
    saveState();
    whisper(`a replica appeared in ${ai.name}'s gallery.`);
  }
  else if (roll < 0.72) {
    // Faint name mutation (single char)
    const glitchChars = '█▓▒░|/\\:;~@#$%^&*<>?';
    const idx = randInt(0, ai.name.length-1);
    const mutatedName = ai.name.slice(0, idx) + pick(glitchChars.split('')) + ai.name.slice(idx+1);
    const nameEl = $('sidebar-name-' + ai.id);
    if (nameEl) {
      nameEl.textContent = mutatedName;
      setTimeout(() => {
        if (nameEl) nameEl.textContent = ai.name;
      }, 1200);
    }
    whisper(`${ai.name} flickered.`);
  }
  else {
    // Whisper from the AI
    const aiWhispers = [
      `${ai.name}: i remember.`,
      `${ai.name}: still here.`,
      `${ai.name}: watching.`,
      `${ai.name}: ...`,
      `${ai.name}: ᗨ`,
    ];
    whisper(pick(aiWhispers));
  }
}

// ═══════════════════════════════════════════════════════════════
// CORRUPTION SYSTEM
// ═══════════════════════════════════════════════════════════════
function triggerCorruption(target, intruder) {
  // Determine tier based on instability and randomness
  let tier;
  const roll = Math.random();
  if (target.instability > 0.6 && roll < 0.15) tier = 3;
  else if (target.instability > 0.3 && roll < 0.3) tier = 2;
  else if (roll < 0.15) tier = 2;
  else tier = 1;

  target.corruptionHistory.push({ tier, intruderId: intruder.id, at: Date.now() });
  target.instability = Math.min(1, target.instability + 0.08 * tier);

  if (tier === 1) corruptionTier1(target, intruder);
  else if (tier === 2) corruptionTier2(target, intruder);
  else corruptionTier3(target, intruder);

  saveState();
  renderSidebar();
}

function corruptionTier1(target, intruder) {
  showEvent(`[T1] ${intruder.name} brushed ${target.name}`, 2500);
  whisper(`slow interference from ${intruder.name}...`);

  // Slow color drift toward intruder
  const steps = 12;
  let step = 0;
  const interval = setInterval(() => {
    step++;
    target.color = blendColors(target.color, intruder.color, 0.05);
    const dotEl = $('sidebar-dot-' + target.id);
    if (dotEl) {
      dotEl.style.background = target.color;
      dotEl.style.boxShadow = glowStyle(target.color, 0.8, 0.8);
    }
    if (step >= steps) {
      clearInterval(interval);
      saveState();
      renderSidebar();
    }
  }, 200);

  // Minor name glitch on sidebar
  const nameEl = $('sidebar-name-' + target.id);
  if (nameEl) {
    glitchNameBriefly(nameEl, target.name, 1500);
  }

  // Add faint scanlines
  document.body.classList.add('scanline-burst');
  setTimeout(() => document.body.classList.remove('scanline-burst'), 1500);
}

function corruptionTier2(target, intruder) {
  showEvent(`[T2] IDENTITY CONFLICT: ${target.name} ↔ ${intruder.name}`, 4000);
  whisper(`${target.name} and ${intruder.name} are merging...`);

  // Fusion name
  const fusedName = fusenames(target.name, intruder.name);
  showEvent(`${fusedName} — identity unstable`, 3000);

  // Rapid color flickering on sidebar
  const dotEl = $('sidebar-dot-' + target.id);
  const nameEl = $('sidebar-name-' + target.id);
  if (nameEl) nameEl.textContent = fusedName;

  let flicker = 0;
  const flickerInterval = setInterval(() => {
    flicker++;
    if (dotEl) {
      dotEl.style.background = flicker % 2 === 0 ? target.color : intruder.color;
      dotEl.style.boxShadow = glowStyle(flicker % 2 === 0 ? target.color : intruder.color, 0.8, 0.8);
    }
    if (flicker > 20) {
      clearInterval(flickerInterval);
      // Settle on blended color
      target.color = blendColors(target.color, intruder.color, 0.25);
      if (dotEl) {
        dotEl.style.background = target.color;
        dotEl.style.boxShadow = glowStyle(target.color, 0.8, 0.8);
      }
      if (nameEl) nameEl.textContent = target.name;
      target.mutations++;
      saveState();
      renderSidebar();
    }
  }, 100);

  // Inject mixed-trait replicas into target
  const mixedReps = randInt(2, 4);
  for (let i = 0; i < mixedReps; i++) {
    const rep = generateReplica(target, true);
    rep.color = blendColors(target.color, intruder.color, rand(0.3, 0.7));
    rep.label = fusedName.slice(0,6).toLowerCase();
    target.replicas.push(rep);
  }

  // Glitch text floater
  spawnFloater(fusedName, target.color);

  target.instability = Math.min(1, target.instability + 0.05);
  saveState();
}

function corruptionTier3(target, intruder) {
  showEvent(`[T3] SYSTEM BREAKING — ${target.name} overloaded`, 5000);

  // Screen shake
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 500);

  // Affects multiple AIs
  const victims = state.ais.filter(a => a.id !== intruder.id && !a.isDormant);
  victims.forEach(v => {
    if (Math.random() < 0.5) {
      v.instability = Math.min(1, v.instability + 0.06);
      v.color = shiftColor(v.color, 0.08);
    }
  });

  // Big name mutation on target
  const glitchNames = [
    target.name.split('').reverse().join(''),
    target.name.toUpperCase() + '_' + randInt(10,99),
    fusenames(target.name, intruder.name).toUpperCase(),
    target.name.replace(/[aeiou]/gi, '#'),
  ];
  const newName = pick(glitchNames);

  // Either: target goes dormant, OR spawns a fragment
  if (Math.random() < 0.4 && state.ais.length < 12) {
    // Create corrupted fragment
    const fragment = newAI(newName.slice(0, 16), blendColors(target.color, intruder.color, 0.5));
    fragment.instability = 0.5;
    fragment.traits.distortions = [...target.traits.distortions, ...intruder.traits.distortions].slice(0, 2);
    state.ais.push(fragment);
    target.fragments.push(fragment.name);
    showEvent(`fragment "${fragment.name}" spawned from the wreckage`, 4000);
    whisper(`something new emerged from the chaos.`);
  } else {
    // Target goes dormant
    target.isDormant = true;
    target.color = '#444466';
    showEvent(`${target.name} became dormant — left a trace`, 4000);
    whisper(`${target.name} is gone. something remains.`);
  }

  // Spawn floaters
  for (let i = 0; i < 4; i++) {
    setTimeout(() => {
      spawnFloater(pick(['ERROR', 'OVERFLOW', '████', target.name, intruder.name, '???']),
        pick([target.color, intruder.color, '#ff4040', '#40ffff']));
    }, i * 300);
  }

  target.instability = Math.min(1, target.instability + 0.15);
  saveState();
  renderSidebar();
}

function fusenames(a, b) {
  const mid = Math.floor(a.length / 2);
  const mid2 = Math.floor(b.length / 2);
  return a.slice(0, mid) + b.slice(mid2);
}

// ═══════════════════════════════════════════════════════════════
// FEEDING
// ═══════════════════════════════════════════════════════════════
function handleFeed(files) {
  const ai = getActive();
  if (!ai || files.length === 0) return;

  ai.feedCount++;
  ai.lastActiveAt = Date.now();

  // Pulse animation
  $('dot-container').classList.add('dot-feeding');
  setTimeout(() => $('dot-container').classList.remove('dot-feeding'), 700);

  // Evolve traits slightly with each feed
  evolvTraits(ai);

  // Process images
  let processed = 0;
  const filesToProcess = Math.min(files.length, 8);

  Array.from(files).slice(0, filesToProcess).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      ai.fedImages.push(e.target.result);
      processed++;
      if (processed === filesToProcess) {
        // All images loaded, generate replicas
        generateReplicas(ai);
        saveState();
        renderStage();
        renderSidebar();
        whisper(`${ai.name} consumed ${filesToProcess} image${filesToProcess > 1 ? 's' : ''}.`);
      }
    };
    reader.readAsDataURL(file);
  });
}

function evolvTraits(ai) {
  // Aggression creeps up or down
  ai.traits.aggression = Math.max(0, Math.min(1,
    ai.traits.aggression + (Math.random() - 0.5) * 0.04
  ));
  // Clarity tightens with more feeds (gets more "itself")
  ai.traits.clarity = Math.min(0.95, ai.traits.clarity + 0.01);
  // Occasionally swap a preferred distortion
  if (Math.random() < 0.05) {
    const allOthers = DISTORTION_TYPES.filter(d => !ai.traits.distortions.includes(d));
    if (allOthers.length > 0) {
      ai.traits.distortions[1] = pick(allOthers);
    }
  }
}

function generateReplicas(ai) {
  const count = randInt(ai.traits.replicaMin, ai.traits.replicaMax);
  for (let i = 0; i < count; i++) {
    ai.replicas.push(generateReplica(ai, false));
  }
}

function generateReplica(ai, forceDistort) {
  const isDistorted = forceDistort || (Math.random() > ai.traits.clarity);
  const distType = pick(ai.traits.distortions);

  // Color stays close to AI's color, with variance based on instability
  const colorVariance = 0.1 + ai.instability * 0.4;
  const repColor = isDistorted
    ? shiftColor(ai.color, colorVariance)
    : blendColors(ai.color, ai.baseColor, 0.3);

  const sizes = { small: 20, medium: 28, large: 38 };
  // Some AIs produce consistently same-sized replicas; others vary
  const size = ai.traits.replicaSize === 'mixed'
    ? pick(['small','medium','large'])
    : ai.traits.replicaSize;

  // Label hints at the AI's identity and distortion style
  const labels = [
    ai.name.toLowerCase().slice(0,4),
    distType.slice(0,4),
    `#${ai.feedCount}`,
    `r${ai.replicas.length+1}`,
  ];

  return {
    color: repColor,
    size,
    distorted: isDistorted,
    distortionType: distType,
    label: pick(labels),
    age: Date.now(),
  };
}

// ═══════════════════════════════════════════════════════════════
// UI FEEDBACK
// ═══════════════════════════════════════════════════════════════
function whisper(msg) {
  const el = document.createElement('div');
  el.className = 'whisper';
  el.textContent = msg;
  $('whisper-container').appendChild(el);
  setTimeout(() => el.remove(), 4200);
}

function showEvent(msg, duration=3000) {
  const box = $('event-box');
  box.textContent = msg;
  box.classList.add('visible');
  clearTimeout(box._timeout);
  box._timeout = setTimeout(() => box.classList.remove('visible'), duration);
}

function glitchNameBriefly(el, realName, duration) {
  const glitchChars = '█▓▒░?!@#';
  let ticks = 0;
  const interval = setInterval(() => {
    ticks++;
    if (ticks > duration/80) {
      clearInterval(interval);
      el.textContent = realName;
      return;
    }
    const idx = randInt(0, realName.length-1);
    el.textContent = realName.slice(0,idx) + pick(glitchChars.split('')) + realName.slice(idx+1);
  }, 80);
}

function spawnFloater(text, color) {
  const el = document.createElement('div');
  el.className = 'glitch-floater';
  el.textContent = text;
  el.style.color = color;
  el.style.left = randInt(10, 80) + 'vw';
  el.style.top = randInt(10, 80) + 'vh';
  el.style.textShadow = `0 0 8px ${color}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ═══════════════════════════════════════════════════════════════
// CREATE / DELETE
// ═══════════════════════════════════════════════════════════════
function openModal() {
  $('modal-overlay').classList.add('open');
  $('modal-name').value = '';
  $('modal-color').value = randomVibrantHex();
  $('modal-name').focus();
}
function closeModal() {
  $('modal-overlay').classList.remove('open');
}

function randomVibrantHex() {
  const hue = randInt(0, 360);
  const sat = randInt(60, 100);
  const lig = randInt(45, 65);
  return hslToHex(hue, sat, lig);
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1-l);
  const f = n => {
    const k = (n + h/30) % 12;
    const color = l - a * Math.max(Math.min(k-3, 9-k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2,'0');
  };
  return '#' + f(0) + f(8) + f(4);
}

function createAI() {
  const name = $('modal-name').value.trim();
  const color = $('modal-color').value;
  if (!name) { $('modal-name').focus(); return; }

  const ai = newAI(name, color);
  state.ais.push(ai);
  saveState();
  closeModal();
  renderSidebar();
  whisper(`${name} was instantiated.`);
}

function deleteAI(id) {
  const ai = getAI(id);
  if (!ai) return;

  if (ai.isDormant) {
    // Purge dormant
    state.ais = state.ais.filter(a => a.id !== id);
    if (state.activeId === id) state.activeId = null;
    whisper(`${ai.name} was purged.`);
  } else if (ai.instability > 0.5) {
    // High instability → goes dormant instead
    ai.isDormant = true;
    ai.color = '#333350';
    if (state.activeId === id) state.activeId = null;
    showEvent(`${ai.name} was too unstable — became dormant`, 3000);
    whisper(`${ai.name} resisted deletion. now dormant.`);
  } else {
    // Normal deletion → AI becomes a fragment
    const fragColor = shiftColor(ai.color, 0.2);
    state.ais = state.ais.filter(a => a.id !== id);
    if (state.activeId === id) state.activeId = null;

    if (Math.random() < 0.35 && state.ais.length < 14) {
      const frag = newAI(ai.name.slice(0,8) + '_frag', fragColor);
      frag.instability = 0.3;
      frag.traits = { ...ai.traits };
      frag.replicas = ai.replicas.slice(-5);
      state.ais.push(frag);
      whisper(`${ai.name} left a fragment behind.`);
    } else {
      whisper(`${ai.name} was removed. something echoes.`);
    }
  }

  saveState();
  renderSidebar();
  renderStage();
}

// ═══════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'root_ai_ecosystem_' + Date.now() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  whisper('ecosystem exported.');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (parsed && Array.isArray(parsed.ais)) {
        state = parsed;
        saveState();
        renderSidebar();
        renderStage();
        whisper('ecosystem imported.');
      }
    } catch(err) {
      showEvent('Import failed — invalid data', 2500);
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════════════
// BACKGROUND TICK — quiet events, slow evolution
// ═══════════════════════════════════════════════════════════════
function backgroundTick() {
  const backgroundAIs = state.ais.filter(a => a.id !== state.activeId && !a.isDormant);

  backgroundAIs.forEach(ai => {
    // Very slow color drift back toward base color
    if (Math.random() < 0.03) {
      ai.color = blendColors(ai.color, ai.baseColor, 0.02);
    }
    // Rare quiet event
    if (Math.random() < 0.008) {
      quietEvent(ai);
    }
  });

  // Active AI: minor evolution tick
  const active = getActive();
  if (active && Math.random() < 0.02) {
    // Tiny glow color shift on active dot
    const shifted = shiftColor(active.color, 0.005);
    active.color = blendColors(active.color, shifted, 0.1);
    applyDotColor(active.color);
    $('ai-display-name').style.color = active.color;
    $('ai-display-name').style.textShadow = `0 0 30px ${active.color}`;
  }

  // Save occasionally
  if (Math.random() < 0.1) saveState();
}

// ═══════════════════════════════════════════════════════════════
// INIT & EVENT WIRING
// ═══════════════════════════════════════════════════════════════
function init() {
  loadState();
  renderSidebar();
  renderStage();

  // Background tick every 8s
  setInterval(backgroundTick, 8000);

  // Sidebar corruption tick: occasionally background AIs interfere with each other
  setInterval(() => {
    const dormantAIs = state.ais.filter(a => !a.isDormant);
    if (dormantAIs.length >= 2 && !state.activeId && Math.random() < 0.08) {
      const [a, b] = shuffle(dormantAIs).slice(0, 2);
      if (a && b) triggerCorruption(a, b);
    }
  }, 30000);

  // Whisper on load if AIs exist
  if (state.ais.length > 0) {
    const awakened = state.ais.filter(a => !a.isDormant);
    if (awakened.length > 0) {
      setTimeout(() => {
        whisper(`${awakened.length} entit${awakened.length === 1 ? 'y' : 'ies'} active in Root.`);
      }, 1500);
    }
  }
}

// Button events
$('btn-create').onclick = openModal;
$('modal-confirm').onclick = createAI;
$('modal-cancel').onclick = closeModal;
$('modal-name').onkeydown = (e) => { if (e.key === 'Enter') createAI(); if (e.key === 'Escape') closeModal(); };
$('modal-overlay').onclick = (e) => { if (e.target === $('modal-overlay')) closeModal(); };

$('feed-input').onchange = (e) => {
  if (e.target.files.length > 0) {
    handleFeed(e.target.files);
    e.target.value = ''; // reset so same files can be re-fed
  }
};

$('btn-export').onclick = exportData;
$('btn-import-trigger').onclick = () => $('import-input').click();
$('import-input').onchange = (e) => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
};

$('btn-reset').onclick = () => {
  if (confirm('Purge all entities and reset the ecosystem?')) {
    localStorage.removeItem(STORAGE_KEY);
    state = { ais: [], activeId: null };
    renderSidebar();
    renderStage();
    whisper('the ecosystem was reset. silence.');
  }
};

// Clicking the dot center triggers a pulse / small event
$('dot-container').onclick = () => {
  const ai = getActive();
  if (!ai) return;
  $('dot-container').classList.add('dot-feeding');
  setTimeout(() => $('dot-container').classList.remove('dot-feeding'), 700);
  // Rare: clicking triggers a quiet whisper from the AI
  const msgs = [
    `${ai.name}: i felt that.`,
    `${ai.name}: ...`,
    `${ai.name}: still processing.`,
    `${ai.name}: what do you want?`,
    `resonance detected.`,
    `${ai.name} acknowledged.`,
  ];
  if (Math.random() < 0.5) whisper(pick(msgs));
};

init();
</script>
