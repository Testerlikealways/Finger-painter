<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Text Display Generator</title>

<style>
body {
    background:#0b0e14;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container {
    width:450px;
    background:#161b22;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 30px #000;
}

h1 {
    text-align:center;
    color:#58a6ff;
}

input, select, button, textarea {
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#21262d;
    color:white;
    font-size:15px;
}

.checkbox {
    margin-top:15px;
}

.checkbox input {
    width:auto;
}

.preview {
    margin-top:20px;
    padding:25px;
    background:#000;
    border-radius:12px;
    text-align:center;
    font-size:40px;
}

button {
    background:#238636;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#2ea043;
}

textarea {
    height:140px;
    color:#7ee787;
}
</style>
</head>

<body>

<div class="container">

<h1>Text Display Generator</h1>

<input id="text" placeholder="Text" value="Shop">

<select id="color">
<option value="black">Black</option>
<option value="dark_blue">Dark Blue</option>
<option value="dark_green">Dark Green</option>
<option value="dark_aqua">Dark Aqua</option>
<option value="dark_red">Dark Red</option>
<option value="dark_purple">Dark Purple</option>
<option value="gold">Gold</option>
<option value="gray">Gray</option>
<option value="dark_gray">Dark Gray</option>
<option value="blue">Blue</option>
<option value="green">Green</option>
<option value="aqua">Aqua</option>
<option value="red">Red</option>
<option value="light_purple">Light Purple</option>
<option value="yellow">Yellow</option>
<option value="white" selected>White</option>
</select>

<input id="size" type="number" value="2.1" step="0.1">

<div class="checkbox">
<label><input id="bold" type="checkbox"> Bold</label>
<label><input id="underline" type="checkbox"> Underlined</label>
<label><input id="italic" type="checkbox"> Cursive / Italic</label>
</div>

<select id="billboard">
<option value="center">Center</option>
<option value="fixed">Fixed</option>
<option value="vertical">Vertical</option>
<option value="horizontal">Horizontal</option>
</select>

<div class="preview" id="preview">
Shop
</div>

<button onclick="generate()">Generate</button>

<textarea id="output" readonly></textarea>

</div>


<script>

const inputs=document.querySelectorAll("input,select");

inputs.forEach(x=>{
    x.addEventListener("input",update);
    x.addEventListener("change",update);
});


function update(){

let text=document.getElementById("text").value;
let color=document.getElementById("color").value;

let preview=document.getElementById("preview");

preview.innerText=text;
preview.style.color=color.replace("_"," ");

preview.style.fontWeight=
document.getElementById("bold").checked ? "bold":"normal";

preview.style.textDecoration=
document.getElementById("underline").checked ? "underline":"none";

preview.style.fontStyle=
document.getElementById("italic").checked ? "italic":"normal";

}


function generate(){

let text=document.getElementById("text").value;
let color=document.getElementById("color").value;
let size=document.getElementById("size").value;

let extra="";

if(document.getElementById("bold").checked)
extra+=',"bold":true';

if(document.getElementById("underline").checked)
extra+=',"underlined":true';

if(document.getElementById("italic").checked)
extra+=',"italic":true';


let command=
`/summon minecraft:text_display ~ ~ ~ {text:{"text":"${text}","color":"${color}"${extra}},billboard:"${document.getElementById("billboard").value}",transformation:{translation:[0f,0f,0f],scale:[${size}f,${size}f,${size}f],left_rotation:[0f,0f,0f,1f],right_rotation:[0f,0f,0f,1f]}}`;

document.getElementById("output").value=command;

}

update();

</script>

</body>
</html>
