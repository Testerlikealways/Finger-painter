<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOT — AI Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --bg: #050508;
  --surface: #090910;
  --surface2: #0d0d18;
  --border: rgba(255,255,255,0.055);
  --text: #b8b8d4;
  --dim: #484868;
  --bright: #e4e4ff;
  --green: #48c87a;
  --amber: #c89848;
  --red: #c04060;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Syne', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); overflow:hidden; }

/* CRT scanlines overlay */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
  opacity:0.5;
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
#app { display:flex; width:100%; height:100%; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
#sidebar {
  width:272px; min-width:272px; height:100%;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden; z-index:10;
}

#sb-header { padding:18px 14px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }

#sb-title {
  font-family:var(--display); font-size:10px; font-weight:800;
  letter-spacing:0.22em; color:var(--dim); text-transform:uppercase; margin-bottom:12px;
}

#btn-create {
  width:100%; background:rgba(123,94,167,0.12); border:1px solid rgba(123,94,167,0.35);
  color:#b090e0; font-family:var(--mono); font-size:12px; padding:9px 12px;
  cursor:pointer; letter-spacing:0.1em; text-align:left; transition:all 0.2s;
}
#btn-create:hover { background:rgba(123,94,167,0.22); border-color:rgba(123,94,167,0.7); color:#d0b8ff; }

/* AI LIST */
#ai-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

.ai-entry {
  border-bottom:1px solid var(--border); position:relative; transition:background 0.15s;
}
.ai-entry:hover { background:rgba(255,255,255,0.018); }
.ai-entry.is-active { background:rgba(123,94,167,0.07); }
.ai-entry.is-dormant { opacity:0.45; }

.entry-top { display:flex; align-items:center; gap:9px; padding:9px 12px 5px; }

.entry-dot {
  width:11px; height:11px; border-radius:50%; flex-shrink:0;
  transition:box-shadow 0.4s, background 0.6s;
}

.entry-name {
  flex:1; font-size:12px; color:var(--bright); letter-spacing:0.05em;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.entry-name.is-dormant-name { color:var(--dim); }

.entry-badge { font-size:9px; color:var(--dim); letter-spacing:0.08em; flex-shrink:0; }
.entry-badge.active  { color:var(--green); }
.entry-badge.dormant { color:var(--dim); }

/* Controls — ALWAYS VISIBLE on every entry */
.entry-controls { display:flex; gap:4px; padding:4px 12px 9px; }

.ec-btn {
  font-family:var(--mono); font-size:9px; padding:3px 7px;
  border:1px solid; background:transparent; cursor:pointer;
  letter-spacing:0.06em; transition:all 0.15s; line-height:1.4;
}
.ec-btn:disabled { opacity:0.22; cursor:not-allowed; pointer-events:none; }

.ec-btn.enter  { border-color:rgba(72,200,122,0.35); color:var(--green); }
.ec-btn.enter:not(:disabled):hover { background:rgba(72,200,122,0.14); border-color:rgba(72,200,122,0.8); }
.ec-btn.enter.here { border-color:rgba(72,200,122,0.12); color:rgba(72,200,122,0.4); cursor:default; pointer-events:none; }

.ec-btn.away  { border-color:rgba(200,152,72,0.35); color:var(--amber); }
.ec-btn.away:not(:disabled):hover { background:rgba(200,152,72,0.14); border-color:rgba(200,152,72,0.8); }

.ec-btn.del   { border-color:rgba(192,64,96,0.35); color:var(--red); }
.ec-btn.del:not(:disabled):hover  { background:rgba(192,64,96,0.14); border-color:rgba(192,64,96,0.8); }

/* Instability bar — bottom of entry, driven by real instability value */
.instab-bar {
  position:absolute; bottom:0; left:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--red));
  transition:width 0.8s, opacity 0.5s;
}

/* SIDEBAR FOOTER */
#sb-footer {
  padding:10px 12px; border-top:1px solid var(--border);
  display:flex; gap:6px; flex-shrink:0;
}
.sf-btn {
  flex:1; font-family:var(--mono); font-size:9px; padding:7px 4px;
  border:1px solid var(--border); background:transparent; color:var(--dim);
  cursor:pointer; letter-spacing:0.06em; transition:all 0.2s; text-align:center;
}
.sf-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.18); }
#btn-reset:hover { color:var(--red); border-color:var(--red); }
#import-file { display:none; }

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
#main {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:36px 24px 24px; overflow-y:auto; position:relative;
}

#empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; gap:16px; opacity:0.35;
}
.empty-ring {
  width:80px; height:80px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  animation:epulse 3.5s ease-in-out infinite;
}
@keyframes epulse { 0%,100%{transform:scale(1);opacity:0.3;} 50%{transform:scale(1.07);opacity:0.6;} }
#empty-state p { font-size:12px; letter-spacing:0.16em; text-align:center; line-height:2; }

#stage { display:none; flex-direction:column; align-items:center; width:100%; }

/* INFO BAR */
#info-bar {
  display:flex; align-items:flex-start; gap:20px; margin-bottom:32px;
  width:100%; max-width:680px;
}

#ai-name-el {
  font-family:var(--display); font-size:30px; font-weight:800;
  letter-spacing:0.05em; color:var(--bright); transition:color 0.6s;
  line-height:1; position:relative; display:inline-block;
}
/* Glitch pseudo-layers — render only, content set via data-name */
#ai-name-el::before, #ai-name-el::after {
  content:attr(data-name); position:absolute; left:0; top:0; opacity:0;
  font-family:var(--display); font-size:30px; font-weight:800;
}
#ai-name-el.glitching::before {
  color:#ff4444; clip-path:polygon(0 0,100% 0,100% 38%,0 38%);
  animation:ga 0.28s steps(2) infinite; opacity:0.75;
}
#ai-name-el.glitching::after {
  color:#44ffee; clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);
  animation:gb 0.33s steps(2) infinite; opacity:0.75;
}
@keyframes ga { 0%{transform:translate(-2px,1px);} 50%{transform:translate(2px,-1px);} 100%{transform:translate(-1px,0);} }
@keyframes gb { 0%{transform:translate(2px,-1px);} 50%{transform:translate(-2px,1px);} 100%{transform:translate(1px,0);} }

#ai-sub { font-size:10px; color:var(--dim); letter-spacing:0.12em; margin-top:5px; line-height:2; }
#ai-stats { margin-left:auto; text-align:right; font-size:10px; color:var(--dim); letter-spacing:0.1em; line-height:2; flex-shrink:0; }

/* ══════════════════════════════════════
   CENTRAL DOT
══════════════════════════════════════ */
#dot-wrap {
  position:relative; width:200px; height:200px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:36px; cursor:pointer;
}
#dot-aura {
  position:absolute; width:200px; height:200px; border-radius:50%;
  filter:blur(32px); opacity:0.13; transition:background 0.8s;
  animation:breathe 4.2s ease-in-out infinite;
}
#dot-mid {
  position:absolute; width:110px; height:110px; border-radius:50%;
  filter:blur(18px); opacity:0.22; transition:background 0.8s;
  animation:breathe 4.2s ease-in-out infinite 0.6s;
}
#dot-core {
  position:relative; width:58px; height:58px; border-radius:50%; z-index:2;
  transition:background 0.8s, box-shadow 0.8s;
  animation:bscale 4.2s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{transform:scale(0.88);opacity:0.1;} 50%{transform:scale(1.18);opacity:0.28;} }
@keyframes bscale  { 0%,100%{transform:scale(1);} 50%{transform:scale(1.09);} }

@keyframes feed-burst { 0%{transform:scale(1);} 25%{transform:scale(1.7);} 65%{transform:scale(0.88);} 100%{transform:scale(1);} }
.feeding #dot-core { animation:feed-burst 0.55s ease-out, bscale 4.2s ease-in-out 0.55s infinite; }

/* ══════════════════════════════════════
   FEED SECTION
══════════════════════════════════════ */
#feed-section { width:100%; max-width:680px; display:flex; flex-direction:column; align-items:center; gap:22px; }

#feed-label {
  display:inline-block; font-family:var(--mono); font-size:11px; padding:9px 26px;
  border:1px solid rgba(255,255,255,0.1); color:var(--text); cursor:pointer;
  letter-spacing:0.16em; transition:all 0.2s; text-transform:uppercase;
}
#feed-label:hover { border-color:rgba(255,255,255,0.3); color:var(--bright); }
#feed-input { display:none; }

.gal-section { width:100%; }
.gal-label {
  font-size:10px; letter-spacing:0.2em; color:var(--dim); text-transform:uppercase;
  margin-bottom:10px; display:flex; align-items:center; gap:10px;
}
.gal-label::after { content:''; flex:1; height:1px; background:var(--border); }

.img-grid { display:flex; flex-wrap:wrap; gap:7px; }
.fed-img {
  width:68px; height:68px; object-fit:cover; border:1px solid var(--border);
  filter:saturate(0.6) brightness(0.8); transition:all 0.2s;
}
.fed-img:hover { filter:saturate(1) brightness(1); border-color:rgba(255,255,255,0.18); }

.rep-grid { display:flex; flex-wrap:wrap; gap:14px; align-items:flex-start; }
.rep-item { display:flex; flex-direction:column; align-items:center; gap:5px; width:60px; animation:rep-pop 0.35s ease-out; }
@keyframes rep-pop { from{opacity:0;transform:scale(0.3) translateY(8px);} to{opacity:1;transform:none;} }
.rep-dot { border-radius:50%; flex-shrink:0; }
.rep-lbl { font-size:9px; color:var(--dim); letter-spacing:0.06em; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60px; }

/* ══════════════════════════════════════
   WHISPERS
══════════════════════════════════════ */
#whispers {
  position:fixed; bottom:18px; right:18px; display:flex;
  flex-direction:column; gap:5px; pointer-events:none; z-index:8000;
}
.whisper {
  font-size:10px; color:var(--dim); letter-spacing:0.1em; text-align:right;
  animation:wh 4.5s ease-in-out forwards; opacity:0;
}
@keyframes wh { 0%{opacity:0;transform:translateY(4px);} 12%{opacity:0.55;transform:none;} 85%{opacity:0.45;} 100%{opacity:0;} }

/* EVENT BANNER */
#event-banner {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid rgba(192,64,96,0.45);
  padding:11px 22px; font-size:11px; letter-spacing:0.1em; color:var(--red);
  z-index:7500; max-width:460px; text-align:center; pointer-events:none;
  opacity:0; transition:opacity 0.25s;
}
#event-banner.show { opacity:1; }

/* FLOATERS */
.floater {
  position:fixed; font-family:var(--mono); font-size:11px; pointer-events:none;
  z-index:6500; letter-spacing:0.1em; animation:float-up 3.2s ease-out forwards;
}
@keyframes float-up { 0%{opacity:0;} 12%{opacity:0.85;} 85%{opacity:0.6;} 100%{opacity:0;transform:translateY(-28px);} }

/* ══════════════════════════════════════
   SCREEN FX
══════════════════════════════════════ */
@keyframes shake {
  0%,100%{transform:none;} 10%{transform:translate(-5px,2px) rotate(-0.3deg);}
  20%{transform:translate(5px,-2px) rotate(0.3deg);} 30%{transform:translate(-4px,3px);}
  40%{transform:translate(4px,-3px);} 60%{transform:translate(3px,-2px);} 80%{transform:translate(-2px,1px);}
}
.shaking { animation:shake 0.45s ease-in-out; }

.scanlines::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:8999;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,0.035) 0,rgba(255,255,255,0.035) 1px,transparent 1px,transparent 4px);
  animation:sl-fade 1.8s ease-out forwards;
}
@keyframes sl-fade { 0%{opacity:1;} 100%{opacity:0;} }

@keyframes qpulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.55);} }
.q-pulsing { animation:qpulse 1.8s ease-in-out; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
#modal-mask {
  position:fixed; inset:0; background:rgba(0,0,0,0.72); backdrop-filter:blur(5px);
  z-index:9500; display:none; align-items:center; justify-content:center;
}
#modal-mask.open { display:flex; }
#modal-box {
  background:var(--surface); border:1px solid rgba(123,94,167,0.28);
  padding:28px; min-width:310px; box-shadow:0 0 70px rgba(123,94,167,0.12);
}
.m-title { font-family:var(--display); font-weight:800; font-size:15px; letter-spacing:0.1em; margin-bottom:20px; color:var(--bright); }
.m-field { margin-bottom:14px; }
.m-field label { display:block; font-size:9px; letter-spacing:0.18em; color:var(--dim); text-transform:uppercase; margin-bottom:5px; }
.m-field input[type=text] {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  color:var(--bright); font-family:var(--mono); font-size:13px; padding:8px 9px; outline:none; transition:border-color 0.2s;
}
.m-field input[type=text]:focus { border-color:rgba(123,94,167,0.55); }
.m-field input[type=color] { width:100%; height:40px; border:1px solid var(--border); background:var(--surface2); cursor:pointer; padding:2px; }
.m-actions { display:flex; gap:9px; margin-top:18px; }
.m-btn { flex:1; font-family:var(--mono); font-size:11px; padding:9px; border:1px solid; cursor:pointer; letter-spacing:0.1em; transition:all 0.2s; background:transparent; }
.m-btn.ok { border-color:rgba(123,94,167,0.45); color:#b090e0; }
.m-btn.ok:hover { background:rgba(123,94,167,0.18); }
.m-btn.no { border-color:var(--border); color:var(--dim); }
.m-btn.no:hover { border-color:rgba(255,255,255,0.18); color:var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* Responsive */
@media(max-width:620px){
  #sidebar{width:210px;min-width:210px;}
  #ai-name-el{font-size:22px;}
  #dot-wrap{width:150px;height:150px;}
  #dot-aura{width:150px;height:150px;}
  #dot-mid{width:80px;height:80px;}
  #dot-core{width:44px;height:44px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- ══ SIDEBAR ══ -->
  <div id="sidebar">
    <div id="sb-header">
      <div id="sb-title">Root — Saved AIs</div>
      <button id="btn-create">+ Create New AI</button>
    </div>
    <div id="ai-list"></div>
    <div id="sb-footer">
      <button class="sf-btn" id="btn-export">Export</button>
      <button class="sf-btn" id="btn-import-trigger">Import</button>
      <button class="sf-btn" id="btn-reset">Reset</button>
    </div>
    <input type="file" id="import-file" accept=".json">
  </div>

  <!-- ══ MAIN ══ -->
  <div id="main">
    <div id="empty-state">
      <div class="empty-ring"></div>
      <p>No AI Entered<br>Select one from Root<br>or create a new entity</p>
    </div>

    <div id="stage">
      <div id="info-bar">
        <div>
          <div id="ai-name-el" data-name=""></div>
          <div id="ai-sub"></div>
        </div>
        <div id="ai-stats"></div>
      </div>

      <div id="dot-wrap">
        <div id="dot-aura"></div>
        <div id="dot-mid"></div>
        <div id="dot-core"></div>
      </div>

      <div id="feed-section">
        <label id="feed-label" for="feed-input">⊕ Feed Images</label>
        <input type="file" id="feed-input" multiple accept="image/*">

        <div class="gal-section" id="gal-fed" style="display:none">
          <div class="gal-label">Consumed</div>
          <div class="img-grid" id="fed-grid"></div>
        </div>

        <div class="gal-section" id="gal-reps" style="display:none">
          <div class="gal-label">Replicas</div>
          <div class="rep-grid" id="rep-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="whispers"></div>
<div id="event-banner"></div>

<div id="modal-mask">
  <div id="modal-box">
    <div class="m-title">Instantiate New AI</div>
    <div class="m-field">
      <label>Designation</label>
      <input type="text" id="m-name" placeholder="Name this entity…" maxlength="24">
    </div>
    <div class="m-field">
      <label>Core Frequency</label>
      <input type="color" id="m-color" value="#7b5ea7">
    </div>
    <div class="m-actions">
      <button class="m-btn ok" id="m-ok">Instantiate</button>
      <button class="m-btn no" id="m-cancel">Abort</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//
//  ARCHITECTURE — THREE STRICT LAYERS
//
//  DATA LAYER (persisted, truth — never mutated by corruption effects)
//    ai.name        → always the original name
//    ai.baseColor   → always the original color
//    ai.traits      → slowly evolves via simulation only
//    ai.instability → real mechanic (0–1), affects all systems
//
//  SIMULATION LAYER (event-driven evolution, saved)
//    instability += corruption impact
//    traits.clarity   += feed events
//    traits.aggression fluctuates
//    corruptionEvents[] — log only
//
//  RENDER LAYER (ephemeral, NOT persisted — allowed to glitch)
//    R.colorDrift[id] → current display color (can differ from baseColor)
//    displayed name strings (temporary glitch overlays)
//    replica visual params (renderColor, distortion style)
//    floaters, scanlines, shakes, badges
//
// ═══════════════════════════════════════════════════════════

const SK = 'root_eco_v5';
const DIST_TYPES = ['pixelation','rotation','color-bleed','melting','fragmentation','echo','inversion','dissolve'];

// Render state — ephemeral, never saved
const R = {
  colorDrift: {},   // aiId → current display hex (render layer)
};

// Core state — saved
let S = { ais:[], activeId:null };

// ─── DATA CONSTRUCTORS ───────────────────────────────────
function mkAI(name, color) {
  const id = 'ai_' + Date.now() + '_' + (Math.random()*9999|0);
  return {
    id, name,
    baseColor: color,      // TRUTH — corruption never touches this
    traits: {
      distortions:   shuffle(DIST_TYPES).slice(0,2),
      replicaMin:    (Math.random()*3|0) + 2,
      replicaMax:    (Math.random()*5|0) + 5,
      aggression:    Math.random() * 0.25,
      clarity:       Math.random() * 0.4 + 0.5,
      preferredSize: pick(['small','medium','medium','large']),
    },
    instability:      0,   // REAL mechanic — drives everything
    feedCount:        0,
    replicaCounter:   0,   // monotonic for stable r1,r2,r3… labels
    fedImages:        [],
    replicas:         [],  // capped at 40
    corruptionEvents: [],  // log only, never mutate name/color
    createdAt:        Date.now(),
    isDormant:        false,
  };
}

// ─── PERSISTENCE ─────────────────────────────────────────
function save() {
  try {
    const d = { ...S, ais: S.ais.map(ai => ({
      ...ai,
      fedImages: ai.fedImages.slice(-10),
      replicas:  ai.replicas.slice(-40),
    }))};
    localStorage.setItem(SK, JSON.stringify(d));
  } catch(_) {
    const d = { ...S, ais: S.ais.map(ai => ({ ...ai, fedImages:[], replicas:ai.replicas.slice(-10) }))};
    try { localStorage.setItem(SK, JSON.stringify(d)); } catch(__) {}
  }
}

function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return;
    const p = JSON.parse(raw);
    S = {
      activeId: p.activeId || null,
      ais: (p.ais || []).map(ai => ({
        name:'Unknown', baseColor:'#7b5ea7',
        traits:{ distortions:['echo','pixelation'], replicaMin:2, replicaMax:6, aggression:0.1, clarity:0.6, preferredSize:'medium' },
        instability:0, feedCount:0, replicaCounter:0, fedImages:[], replicas:[],
        corruptionEvents:[], createdAt:Date.now(), isDormant:false,
        ...ai,
      })),
    };
    S.ais.forEach(ai => { R.colorDrift[ai.id] = ai.baseColor; });
  } catch(_) { S = { ais:[], activeId:null }; }
}

// ─── UTILITY ─────────────────────────────────────────────
const $  = id => document.getElementById(id);
const rand  = (a,b) => Math.random()*(b-a)+a;
const randI = (a,b) => Math.floor(rand(a,b+1));
const pick  = arr => arr[Math.floor(Math.random()*arr.length)];
function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){ const j=randI(0,i); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}

function hexRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgbHex(r,g,b) { return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function blend(h1,h2,t) {
  const [r1,g1,b1]=hexRgb(h1),[r2,g2,b2]=hexRgb(h2);
  return rgbHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}
function jitter(hex, amt) {
  const [r,g,b]=hexRgb(hex);
  return rgbHex(r+rand(-amt,amt), g+rand(-amt,amt), b+rand(-amt,amt));
}

const getAI     = id => S.ais.find(a=>a.id===id);
const getActive = () => S.activeId ? getAI(S.activeId) : null;

// Render color for an AI (render layer, may differ from baseColor)
const rc = ai => R.colorDrift[ai.id] || ai.baseColor;

function glow(col, f=1) {
  return `0 0 ${8*f}px ${col}, 0 0 ${22*f}px ${col}, 0 0 ${42*f}px ${col}`;
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR RENDER
// Every AI always has: Enter + Put Away + Delete buttons visible
// ═══════════════════════════════════════════════════════════
function renderSidebar() {
  const list = $('ai-list');
  list.innerHTML = '';

  S.ais.forEach(ai => {
    const isActive  = ai.id === S.activeId;
    const isDormant = ai.isDormant;
    const col       = rc(ai);
    const instPct   = Math.round(ai.instability * 100);

    const entry = document.createElement('div');
    entry.className = ['ai-entry', isActive?'is-active':'', isDormant?'is-dormant':''].join(' ').trim();

    // ── Top: dot + name + status badge ──
    const top = document.createElement('div');
    top.className = 'entry-top';

    const dot = document.createElement('div');
    dot.className = 'entry-dot';
    dot.id = 'edot-' + ai.id;
    dot.style.background = col;
    dot.style.boxShadow  = isDormant ? 'none' : glow(col, 0.55);

    const nameEl = document.createElement('span');
    nameEl.className = 'entry-name' + (isDormant?' is-dormant-name':'');
    nameEl.id = 'ename-' + ai.id;
    // Render layer: show "[dormant]" prefix visually — ai.name stays clean
    nameEl.textContent = isDormant ? `[dormant] ${ai.name}` : ai.name;

    const badge = document.createElement('span');
    badge.className = 'entry-badge' + (isActive?' active':isDormant?' dormant':'');
    badge.textContent = isActive ? '●' : isDormant ? '○' : '';

    top.appendChild(dot);
    top.appendChild(nameEl);
    top.appendChild(badge);

    // ── Controls: always present ──
    const ctrl = document.createElement('div');
    ctrl.className = 'entry-controls';

    // ENTER — disabled if dormant or already active
    const enterBtn = document.createElement('button');
    enterBtn.className = 'ec-btn enter' + (isActive?' here':'');
    enterBtn.textContent = isActive ? 'here' : 'Enter';
    if (isDormant || isActive) {
      enterBtn.disabled = true;
    } else {
      enterBtn.onclick = e => { e.stopPropagation(); enterAI(ai.id); };
    }

    // PUT AWAY — always visible, disabled only if dormant
    // Behavior: active AI → exit + corruption roll
    //           inactive AI → background interference / dormancy nudge
    const awayBtn = document.createElement('button');
    awayBtn.className = 'ec-btn away';
    awayBtn.textContent = 'Away';
    if (isDormant) {
      awayBtn.disabled = true;
    } else {
      awayBtn.onclick = e => { e.stopPropagation(); putAway(ai.id); };
    }

    // DELETE / TRANSFORM
    const delBtn = document.createElement('button');
    delBtn.className = 'ec-btn del';
    delBtn.textContent = isDormant ? 'Purge' : 'Del';
    delBtn.onclick = e => { e.stopPropagation(); deleteAI(ai.id); };

    ctrl.appendChild(enterBtn);
    ctrl.appendChild(awayBtn);
    ctrl.appendChild(delBtn);

    // Instability bar — driven by REAL instability value
    const ibar = document.createElement('div');
    ibar.className = 'instab-bar';
    ibar.style.width   = (ai.instability * 100) + '%';
    ibar.style.opacity = ai.instability > 0.08 ? '1' : '0';

    entry.appendChild(top);
    entry.appendChild(ctrl);
    entry.appendChild(ibar);
    list.appendChild(entry);
  });
}

// ═══════════════════════════════════════════════════════════
// MAIN STAGE RENDER
// ═══════════════════════════════════════════════════════════
function renderStage() {
  const ai = getActive();
  if (!ai) {
    $('empty-state').style.display = 'flex';
    $('stage').style.display = 'none';
    return;
  }
  $('empty-state').style.display = 'none';
  $('stage').style.display = 'flex';

  const col = rc(ai);
  const instPct = Math.round(ai.instability * 100);

  // Name: render layer. data-name holds truth for CSS glitch pseudos.
  const nameEl = $('ai-name-el');
  nameEl.setAttribute('data-name', ai.name);
  nameEl.textContent = ai.name;
  nameEl.style.color      = col;
  nameEl.style.textShadow = `0 0 28px ${col}55`;

  const distLabel = ai.traits.distortions[0];
  $('ai-sub').innerHTML =
    `<span style="color:${col}88">${distLabel}</span> &nbsp;·&nbsp; ` +
    `instab <span style="color:${instPct>40?'var(--red)':instPct>20?'var(--amber)':'var(--dim)'}">${instPct}%</span>`;

  $('ai-stats').innerHTML =
    `feeds: ${ai.feedCount}<br>` +
    `replicas: ${ai.replicas.length}<br>` +
    `aggr: ${Math.round(ai.traits.aggression*100)}%`;

  applyDotColor(col, ai.instability);

  // Fed images gallery
  const fg = $('fed-grid');
  fg.innerHTML = '';
  if (ai.fedImages.length > 0) {
    $('gal-fed').style.display = 'block';
    ai.fedImages.slice(-16).forEach(src => {
      const img = document.createElement('img');
      img.className='fed-img'; img.src=src; fg.appendChild(img);
    });
  } else { $('gal-fed').style.display='none'; }

  // Replicas — labeled r1, r2, r3… (stable, no identity pollution)
  const rg = $('rep-grid');
  rg.innerHTML = '';
  if (ai.replicas.length > 0) {
    $('gal-reps').style.display = 'block';
    ai.replicas.slice(-24).forEach(rep => {
      const item = document.createElement('div');
      item.className = 'rep-item';

      const sz = {small:18,medium:26,large:36}[rep.size]||22;
      const dot = document.createElement('div');
      dot.className = 'rep-dot';
      dot.style.width  = sz+'px';
      dot.style.height = sz+'px';
      dot.style.background  = rep.renderColor;
      dot.style.boxShadow   = glow(rep.renderColor, rep.distorted ? 1.2 : 0.45);
      if (rep.distorted) {
        dot.style.filter       = repFilter(rep.distType);
        dot.style.borderRadius = rep.distType==='fragmentation' ? '20% 80% 30% 70%' : '50%';
      }

      const lbl = document.createElement('div');
      lbl.className = 'rep-lbl';
      lbl.textContent = 'r' + rep.n;  // Clean monotonic label
      if (rep.distorted) lbl.style.color = col + '88';

      item.appendChild(dot); item.appendChild(lbl);
      rg.appendChild(item);
    });
  } else { $('gal-reps').style.display='none'; }
}

function applyDotColor(col, instability=0) {
  const f = 1 + instability * 0.6;
  $('dot-core').style.background = col;
  $('dot-core').style.boxShadow  = glow(col, f * 1.4);
  $('dot-aura').style.background = col;
  $('dot-mid').style.background  = col;
}

function repFilter(t) {
  switch(t){
    case 'pixelation':    return 'blur(1.5px) contrast(2.2)';
    case 'rotation':      return 'hue-rotate(35deg) saturate(1.6)';
    case 'color-bleed':   return 'blur(2px) saturate(2.4)';
    case 'melting':       return 'blur(1px) brightness(1.4)';
    case 'fragmentation': return 'contrast(3) brightness(0.75)';
    case 'echo':          return 'blur(0.8px) opacity(0.85)';
    case 'inversion':     return 'invert(0.35) hue-rotate(170deg)';
    case 'dissolve':      return 'blur(2.5px) opacity(0.65)';
    default:              return 'blur(1px)';
  }
}

// ═══════════════════════════════════════════════════════════
// ENTER / PUT AWAY
// ═══════════════════════════════════════════════════════════
function enterAI(id) {
  const ai = getAI(id);
  if (!ai || ai.isDormant) return;
  S.activeId = id;
  save();
  renderSidebar();
  renderStage();
  const msgs = [`${ai.name} is watching.`,`entering ${ai.name}…`,`${ai.name} became aware.`,`${ai.name} remembers.`];
  setTimeout(() => whisper(pick(msgs)), 700);
}

// PUT AWAY — works on ANY AI, always accessible from sidebar
//   Active AI:   exits view, rolls for corruption (chance scales with instability)
//   Inactive AI: pushes AI into background state, triggers quiet/background event
function putAway(id) {
  const ai = getAI(id);
  if (!ai || ai.isDormant) return;

  const wasActive = S.activeId === id;
  if (wasActive) { S.activeId = null; }

  save();
  renderSidebar();
  if (wasActive) renderStage();

  // Corruption chance — instability is REAL here, it affects the roll
  const corruptChance = 0.20 + ai.instability * 0.22;
  const background = S.ais.filter(a => a.id !== id && !a.isDormant);

  if (background.length > 0 && Math.random() < corruptChance) {
    const intruder = pick(background);
    const delay = 700 + Math.random()*1500;
    setTimeout(() => triggerCorruption(ai, intruder), delay);
  } else if (!wasActive && background.length > 0 && Math.random() < 0.28) {
    // Inactive put-away: quiet background event
    setTimeout(() => quietEvent(ai), 2000 + Math.random()*4000);
    whisper(`${ai.name} settles into background.`);
  } else if (wasActive) {
    whisper(`${ai.name} put away.`);
  }

  // High instability: chance of spontaneous dormancy
  if (ai.instability > 0.78 && Math.random() < 0.18) {
    setTimeout(() => {
      if (S.activeId === id) S.activeId = null;
      ai.isDormant = true;
      save(); renderSidebar(); renderStage();
      showEvent(`${ai.name} destabilized — went dormant`, 3500);
      whisper(`${ai.name} collapsed under its own weight.`);
    }, 2800);
  }
}

// ═══════════════════════════════════════════════════════════
// QUIET EVENTS — render layer only, creepy, rare
// ═══════════════════════════════════════════════════════════
function quietEvent(ai) {
  const roll = Math.random();
  const col  = rc(ai);

  if (roll < 0.28) {
    // Subtle render-layer color drift (NOT stored to baseColor)
    R.colorDrift[ai.id] = jitter(col, 10 + ai.instability*22);
    const el = $('edot-'+ai.id);
    if (el) {
      el.style.background = R.colorDrift[ai.id];
      el.style.boxShadow  = glow(R.colorDrift[ai.id], 0.55);
      el.classList.add('q-pulsing');
      setTimeout(() => el.classList.remove('q-pulsing'), 2000);
    }
    whisper(`${ai.name} shifted slightly.`);

  } else if (roll < 0.52 && ai.replicas.length > 0) {
    // Phantom replica appears (stored, capped — valid simulation event)
    const rep = mkReplica(ai, true);
    rep.n = ++ai.replicaCounter;
    ai.replicas.push(rep);
    if (ai.replicas.length > 40) ai.replicas.splice(0,1);
    save();
    whisper(`a replica appeared in ${ai.name}'s gallery.`);

  } else if (roll < 0.73) {
    // Name glitch in render layer ONLY — ai.name unchanged
    glitchNameDisplay('ename-'+ai.id, ai.name, 1400);
    whisper(`${ai.name} flickered.`);

  } else {
    const lines = [
      `${ai.name}: i remember.`,`${ai.name}: still here.`,
      `${ai.name}: watching.`,`${ai.name}: …`,`${ai.name}: ᗨ`,
    ];
    whisper(pick(lines));
  }
}

// ═══════════════════════════════════════════════════════════
// CORRUPTION SYSTEM — 3 strict tiers, no overlap
//
// TIER 1: Visual drift only. No structural change.
// TIER 2: Trait pressure + replica distortion. No name/color stored change.
// TIER 3: Creates fragment OR dormancy. (intentional structural event)
// ═══════════════════════════════════════════════════════════
function triggerCorruption(target, intruder) {
  const r = Math.random();
  let tier = 1;
  if (target.instability > 0.55 && r < 0.18) tier = 3;
  else if (target.instability > 0.25 && r < 0.30) tier = 2;
  else if (r < 0.13) tier = 2;

  // SIMULATION: log event, update instability (real mechanic)
  target.corruptionEvents.push({ tier, intruderId:intruder.id, at:Date.now() });
  target.instability = Math.min(1, target.instability + 0.055 * tier);
  // Aggression increases with interference — real trait drift
  target.traits.aggression = Math.min(1, target.traits.aggression + 0.018 * tier);

  if (tier===1) tier1(target, intruder);
  else if (tier===2) tier2(target, intruder);
  else tier3(target, intruder);

  save();
  renderSidebar();
  if (S.activeId===target.id) renderStage();
}

// TIER 1 — Subtle Unease
// RENDER ONLY: color drift toward intruder, name glitch, scanlines
// No simulation layer changes beyond instability (already applied above)
function tier1(target, intruder) {
  showEvent(`[interference] ${intruder.name} → ${target.name}`, 2800);

  const targetRC   = rc(target);
  const intruderRC = rc(intruder);

  // RENDER: slow color drift (NOT to baseColor — render layer only)
  let step=0;
  const iv = setInterval(() => {
    step++;
    R.colorDrift[target.id] = blend(R.colorDrift[target.id]||target.baseColor, intruderRC, 0.06);
    const el = $('edot-'+target.id);
    if (el) { el.style.background=R.colorDrift[target.id]; el.style.boxShadow=glow(R.colorDrift[target.id],0.55); }
    if (S.activeId===target.id) applyDotColor(R.colorDrift[target.id], target.instability);
    if (step>=10) clearInterval(iv);
  }, 220);

  // RENDER: brief name glitch (display only, ai.name untouched)
  glitchNameDisplay('ename-'+target.id, target.name, 1600);

  // RENDER: scanlines burst
  document.body.classList.add('scanlines');
  setTimeout(() => document.body.classList.remove('scanlines'), 1800);

  whisper(`faint signal from ${intruder.name}…`);
}

// TIER 2 — Identity Conflict
// RENDER: color flicker between two AIs, fused name display (temporary)
// SIMULATION: clarity degrades, extra distorted replicas generated
// NO writes to target.name or target.baseColor
function tier2(target, intruder) {
  // Render-only fused name — NEVER written to target.name
  const fusedDisplay = fuseName(target.name, intruder.name);
  showEvent(`[conflict] ${fusedDisplay} — identity unstable`, 4200);

  const targetRC   = rc(target);
  const intruderRC = rc(intruder);

  const dotEl  = $('edot-'+target.id);
  const nameEl = $('ename-'+target.id);

  // RENDER: show fused name temporarily (restore automatically)
  if (nameEl) nameEl.textContent = fusedDisplay;

  let tick=0;
  const fi = setInterval(() => {
    tick++;
    const col = tick%2===0 ? targetRC : intruderRC;
    if (dotEl) { dotEl.style.background=col; dotEl.style.boxShadow=glow(col,0.65); }
    if (S.activeId===target.id) applyDotColor(col, target.instability);
    if (tick>22) {
      clearInterval(fi);
      // Settle on render-layer blend (NOT saved to baseColor)
      R.colorDrift[target.id] = blend(targetRC, intruderRC, 0.18);
      if (dotEl) { dotEl.style.background=R.colorDrift[target.id]; dotEl.style.boxShadow=glow(R.colorDrift[target.id],0.55); }
      if (S.activeId===target.id) applyDotColor(R.colorDrift[target.id], target.instability);
      // Restore real name
      if (nameEl) nameEl.textContent = target.name;
    }
  }, 95);

  // SIMULATION: clarity degrades (real trait change driven by event)
  target.traits.clarity = Math.max(0.05, target.traits.clarity - 0.055);

  // SIMULATION: add distorted replicas (mixed render colors)
  const mixCount = randI(2,4);
  for (let i=0;i<mixCount;i++) {
    const rep = mkReplica(target, true);
    rep.renderColor = blend(targetRC, intruderRC, rand(0.3,0.7));
    rep.n = ++target.replicaCounter;
    target.replicas.push(rep);
    if (target.replicas.length > 40) target.replicas.splice(0,1);
  }

  // RENDER: floater with fused name
  spawnFloater(fusedDisplay, blend(targetRC, intruderRC, 0.5));
  whisper(`${target.name} and ${intruder.name} are interfering.`);
}

// TIER 3 — System Breaking
// RENDER: screen shake, floaters, multi-AI render destabilization
// SIMULATION: strong instability spikes across multiple AIs
// STRUCTURE: new fragment AI spawned (intentional design, NOT mutation of target.name)
//            OR target goes dormant
function tier3(target, intruder) {
  showEvent(`[SYSTEM BREAK] ${target.name} ✕ ${intruder.name}`, 5000);

  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 480);

  // SIMULATION: destabilize nearby AIs (instability is real)
  S.ais.filter(a=>a.id!==intruder.id&&!a.isDormant).forEach(v => {
    if (Math.random()<0.42) {
      v.instability = Math.min(1, v.instability+0.05);
      // RENDER: drift their display color
      R.colorDrift[v.id] = jitter(v.baseColor, 28);
    }
  });

  // SIMULATION: large instability spike on target
  target.instability = Math.min(1, target.instability + 0.20);

  if (Math.random() < 0.38 && S.ais.length < 13) {
    // STRUCTURE: spawn fragment with DERIVED name (not target.name)
    const fragName  = (target.name.slice(0,5) + intruder.name.slice(0,4)).slice(0,14);
    const fragColor = blend(target.baseColor, intruder.baseColor, rand(0.3,0.7));
    const frag = mkAI(fragName, fragColor);
    frag.instability = 0.45;
    frag.traits.distortions = [...target.traits.distortions, ...intruder.traits.distortions].slice(0,2);
    S.ais.push(frag);
    R.colorDrift[frag.id] = fragColor;
    showEvent(`fragment "${fragName}" emerged from the break`, 4000);
    whisper(`something crawled out of the wreckage.`);
  } else {
    // STRUCTURE: target goes dormant (not deleted — echo remains)
    target.isDormant = true;
    if (S.activeId===target.id) S.activeId=null;
    showEvent(`${target.name} became dormant — a trace remains`, 4200);
    whisper(`${target.name} collapsed. something remains.`);
  }

  // RENDER: floaters
  const words = [target.name, intruder.name, 'OVERFLOW', '████', 'ERROR', '???'];
  const cols  = [target.baseColor, intruder.baseColor, '#ff4444','#44ffee'];
  for (let i=0;i<4;i++) {
    setTimeout(() => spawnFloater(pick(words), pick(cols)), i*280);
  }
}

// ═══════════════════════════════════════════════════════════
// FEEDING
// ═══════════════════════════════════════════════════════════
function handleFeed(files) {
  const ai = getActive();
  if (!ai || files.length===0) return;

  ai.feedCount++;
  const dw = $('dot-wrap');
  dw.classList.add('feeding');
  setTimeout(() => dw.classList.remove('feeding'), 600);

  // SIMULATION: trait evolution on feed
  evolveOnFeed(ai);

  let done=0;
  const cap = Math.min(files.length, 8);
  Array.from(files).slice(0,cap).forEach(f => {
    const fr = new FileReader();
    fr.onload = e => {
      ai.fedImages.push(e.target.result);
      if (ai.fedImages.length>12) ai.fedImages.splice(0,1);
      done++;
      if (done===cap) {
        genReplicas(ai);
        save(); renderStage(); renderSidebar();
        whisper(`${ai.name} consumed ${cap} image${cap>1?'s':''}.`);
      }
    };
    fr.readAsDataURL(f);
  });
}

// SIMULATION: feeding drives real trait evolution
function evolveOnFeed(ai) {
  // More feeding → AI gets more "itself" (clarity rises)
  ai.traits.clarity = Math.min(0.97, ai.traits.clarity + 0.008);
  // Aggression fluctuates
  ai.traits.aggression = Math.max(0, Math.min(1, ai.traits.aggression + (Math.random()-0.5)*0.03));
  // Feeding slightly reduces instability
  ai.instability = Math.max(0, ai.instability - 0.012);
  // Every 8 feeds: distortion preference can shift
  if (ai.feedCount % 8 === 0) {
    const others = DIST_TYPES.filter(d=>!ai.traits.distortions.includes(d));
    if (others.length>0) ai.traits.distortions[1] = pick(others);
  }
}

function genReplicas(ai) {
  const count = randI(ai.traits.replicaMin, ai.traits.replicaMax);
  for (let i=0;i<count;i++) {
    const rep = mkReplica(ai, false);
    rep.n = ++ai.replicaCounter;
    ai.replicas.push(rep);
    if (ai.replicas.length>40) ai.replicas.splice(0,1);
  }
}

// mkReplica — RENDER layer object. Instability drives distortion intensity.
function mkReplica(ai, forceDistort) {
  // Instability scales distortion chance
  const distChance = (1-ai.traits.clarity) + ai.instability * 0.38;
  const isDistorted = forceDistort || Math.random() < distChance;
  const distType    = pick(ai.traits.distortions);

  // Render color: close to current display color, variance scales with instability
  const variance  = 12 + ai.instability * 42;
  const baseRC    = R.colorDrift[ai.id] || ai.baseColor;
  const repColor  = isDistorted
    ? jitter(baseRC, variance)
    : blend(baseRC, ai.baseColor, 0.12);

  return {
    n:           0,           // set by caller
    renderColor: repColor,    // render layer only
    size:        ai.traits.preferredSize,
    distorted:   isDistorted,
    distType:    distType,
  };
}

// ═══════════════════════════════════════════════════════════
// CREATE / DELETE
// ═══════════════════════════════════════════════════════════
function createAI() {
  const name  = $('m-name').value.trim();
  const color = $('m-color').value;
  if (!name) { $('m-name').focus(); return; }
  const ai = mkAI(name, color);
  R.colorDrift[ai.id] = color;
  S.ais.push(ai);
  save(); closeModal(); renderSidebar();
  whisper(`${name} was instantiated.`);
}

function deleteAI(id) {
  const ai = getAI(id);
  if (!ai) return;

  if (ai.isDormant) {
    // Dormant: purge cleanly
    S.ais = S.ais.filter(a=>a.id!==id);
    delete R.colorDrift[id];
    if (S.activeId===id) S.activeId=null;
    whisper(`${ai.name} was purged from Root.`);

  } else if (ai.instability > 0.55) {
    // Too unstable to delete → forced dormant instead
    ai.isDormant = true;
    if (S.activeId===id) S.activeId=null;
    showEvent(`${ai.name} resisted deletion — became dormant`, 3000);
    whisper(`${ai.name} refused to be removed.`);

  } else {
    // Normal removal — chance of leaving a fragment
    if (Math.random()<0.32 && S.ais.length<14) {
      const frag = mkAI(ai.name.slice(0,8)+'·frag', jitter(ai.baseColor, 30));
      frag.instability = 0.22;
      frag.traits = { ...ai.traits };
      S.ais = S.ais.filter(a=>a.id!==id);
      delete R.colorDrift[id];
      if (S.activeId===id) S.activeId=null;
      R.colorDrift[frag.id] = frag.baseColor;
      S.ais.push(frag);
      whisper(`${ai.name} dissolved — a fragment remains.`);
    } else {
      S.ais = S.ais.filter(a=>a.id!==id);
      delete R.colorDrift[id];
      if (S.activeId===id) S.activeId=null;
      whisper(`${ai.name} dissolved. something echoes.`);
    }
  }
  save(); renderSidebar(); renderStage();
}

// ═══════════════════════════════════════════════════════════
// UI EFFECTS (render layer)
// ═══════════════════════════════════════════════════════════
function whisper(msg) {
  const el = document.createElement('div');
  el.className='whisper'; el.textContent=msg;
  $('whispers').appendChild(el);
  setTimeout(() => el.remove(), 4700);
}

function showEvent(msg, dur=3000) {
  const b=$('event-banner');
  b.textContent=msg; b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur);
}

// RENDER-ONLY: glitch the displayed name text, always restores to realName
// ai.name is NEVER touched
function glitchNameDisplay(elId, realName, dur) {
  const el=document.getElementById(elId);
  if (!el) return;
  const chars='█▓▒░?!@#|~';
  let t=0;
  const iv=setInterval(()=>{
    t++;
    if (t>dur/75) { clearInterval(iv); el.textContent=realName; return; }
    const i=randI(0,realName.length-1);
    el.textContent = realName.slice(0,i)+pick(chars.split(''))+realName.slice(i+1);
  },75);
}

function spawnFloater(text, color) {
  const el=document.createElement('div');
  el.className='floater'; el.textContent=text;
  el.style.color=color; el.style.textShadow=`0 0 8px ${color}`;
  el.style.left=randI(8,80)+'vw'; el.style.top=randI(10,80)+'vh';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3300);
}

function fuseName(a,b) {
  return (a.slice(0,Math.floor(a.length/2))+b.slice(Math.floor(b.length/2))).slice(0,20);
}

// ═══════════════════════════════════════════════════════════
// BACKGROUND TICK
// Instability is REAL — it drives all variable systems here
// ═══════════════════════════════════════════════════════════
function bgTick() {
  S.ais.forEach(ai => {
    if (ai.isDormant) return;
    const isActive = ai.id===S.activeId;

    // SIMULATION: natural instability decay over time
    ai.instability = Math.max(0, ai.instability - 0.003);

    // RENDER: color drift slowly recovers toward baseColor
    if (R.colorDrift[ai.id]) {
      R.colorDrift[ai.id] = blend(R.colorDrift[ai.id], ai.baseColor, 0.04);
      const el=$('edot-'+ai.id);
      if (el) { el.style.background=R.colorDrift[ai.id]; el.style.boxShadow=glow(R.colorDrift[ai.id],0.55); }
      if (isActive) applyDotColor(R.colorDrift[ai.id], ai.instability);
    }

    // Quiet events: frequency driven by real instability value
    const qChance = 0.004 + ai.instability * 0.016;
    if (!isActive && Math.random() < qChance) quietEvent(ai);
  });

  // Background AI interference (when no active AI)
  const live = S.ais.filter(a=>!a.isDormant);
  if (!S.activeId && live.length>=2 && Math.random() < 0.035 + live.length*0.005) {
    const [a,b]=shuffle(live).slice(0,2);
    if (a&&b) triggerCorruption(a,b);
  }

  // Active AI subtle breathing color variation (render only)
  const active=getActive();
  if (active && Math.random()<0.022) {
    R.colorDrift[active.id] = jitter(R.colorDrift[active.id]||active.baseColor, 3);
    applyDotColor(R.colorDrift[active.id], active.instability);
  }

  if (Math.random()<0.12) save();
}

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
function openModal() {
  $('modal-mask').classList.add('open');
  $('m-name').value='';
  $('m-color').value=randomVibrant();
  $('m-name').focus();
}
function closeModal() { $('modal-mask').classList.remove('open'); }

function randomVibrant() {
  const h=randI(0,360),s=randI(60,100),l=randI(42,62);
  return hslHex(h,s,l);
}
function hslHex(h,s,l) {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return '#'+f(0)+f(8)+f(4);
}

// ═══════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════
function exportData() {
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='root_ecosystem_'+Date.now()+'.json'; a.click();
  URL.revokeObjectURL(url);
  whisper('ecosystem exported.');
}

function importData(file) {
  const fr=new FileReader();
  fr.onload=e=>{
    try {
      const p=JSON.parse(e.target.result);
      if (p&&Array.isArray(p.ais)) {
        S=p;
        S.ais.forEach(ai=>{ R.colorDrift[ai.id]=ai.baseColor; });
        save(); renderSidebar(); renderStage();
        whisper('ecosystem imported.');
      }
    } catch(_){ showEvent('Import failed — invalid data',2500); }
  };
  fr.readAsText(file);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init() {
  load();
  renderSidebar();
  renderStage();

  setInterval(bgTick, 7000);

  const alive = S.ais.filter(a=>!a.isDormant).length;
  if (alive>0) setTimeout(()=>whisper(`${alive} entit${alive===1?'y':'ies'} active in Root.`), 1400);
}

// ── Event wiring ──────────────────────────────────────────
$('btn-create').onclick = openModal;
$('m-ok').onclick      = createAI;
$('m-cancel').onclick  = closeModal;
$('m-name').onkeydown  = e => { if(e.key==='Enter') createAI(); if(e.key==='Escape') closeModal(); };
$('modal-mask').onclick = e => { if(e.target===$('modal-mask')) closeModal(); };

$('feed-input').onchange = e => {
  if (e.target.files.length>0) { handleFeed(e.target.files); e.target.value=''; }
};

$('btn-export').onclick        = exportData;
$('btn-import-trigger').onclick = () => $('import-file').click();
$('import-file').onchange      = e => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''; };

$('btn-reset').onclick = () => {
  if (confirm('Purge all entities and reset? This cannot be undone.')) {
    localStorage.removeItem(SK);
    S = { ais:[], activeId:null };
    Object.keys(R.colorDrift).forEach(k=>delete R.colorDrift[k]);
    renderSidebar(); renderStage();
    whisper('the ecosystem was reset. silence remains.');
  }
};

$('dot-wrap').onclick = () => {
  const ai=getActive(); if(!ai) return;
  const dw=$('dot-wrap');
  dw.classList.add('feeding');
  setTimeout(()=>dw.classList.remove('feeding'),600);
  const msgs=[
    `${ai.name}: i felt that.`,`${ai.name}: …`,`${ai.name}: still processing.`,
    `${ai.name}: what do you want?`,`resonance detected.`,`${ai.name} acknowledged.`,
  ];
  if (Math.random()<0.55) whisper(pick(msgs));
};

init();
</script>
