<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Text Display Generator</title>

<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    padding:40px;
}

.box{
    width:470px;
    background:#161b22;
    padding:25px;
    border-radius:20px;
}

h1{
    text-align:center;
    color:#58a6ff;
}

input,select,button,textarea{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#21262d;
    color:white;
}

input[type="checkbox"]{
    width:auto;
}

label{
    display:block;
    margin-top:10px;
}

button{
    cursor:pointer;
    background:#238636;
    font-weight:bold;
}

.copy{
    background:#1f6feb;
}

.preview{
    margin-top:20px;
    background:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
    font-size:40px;
}

textarea{
    height:180px;
    color:#7ee787;
}
</style>
</head>


<body>

<div class="box">

<h1>Text Display Generator</h1>


<input id="text" value="Common">


<select id="color">
<option value="white">White</option>
<option value="green" selected>Green</option>
<option value="gold">Gold</option>
<option value="red">Red</option>
<option value="blue">Blue</option>
<option value="yellow">Yellow</option>
</select>


<input id="size" type="number" value="2.1" step="0.1">


<label>
<input id="bold" type="checkbox" checked>
Bold
</label>


<label>
<input id="shadow" type="checkbox" checked>
Shadow
</label>


<select id="billboard">

<option value="center">
Center
</option>

<option value="fixed">
Fixed
</option>

</select>


<select id="mode">

<option value="summon">
Summon
</option>

<option value="merge">
Merge nearest
</option>

</select>



<div class="preview" id="preview">
Common
</div>


<button onclick="generate()">
Generate
</button>


<button class="copy" onclick="copyCommand()">
Copy
</button>


<textarea id="output" readonly></textarea>


</div>



<script>


const colors={

white:"#ffffff",
green:"#55ff55",
gold:"#ffaa00",
red:"#ff5555",
blue:"#5555ff",
yellow:"#ffff55"

};



function updatePreview(){

let p=document.getElementById("preview");

p.innerText=document.getElementById("text").value;

p.style.color=
colors[document.getElementById("color").value];

p.style.fontWeight=
document.getElementById("bold").checked
?"bold"
:"normal";

}



document.querySelectorAll("input,select")
.forEach(e=>{
e.addEventListener("input",updatePreview);
e.addEventListener("change",updatePreview);
});



function generate(){


let text=
document.getElementById("text").value;


let color=
document.getElementById("color").value;


let size=
Number(document.getElementById("size").value)
.toFixed(1);



let jsonExtra="";


if(document.getElementById("bold").checked){

jsonExtra+=',"bold":true';

}



let shadow=

document.getElementById("shadow").checked

? "1b"

: "0b";



let billboard=

document.getElementById("billboard").value;



let nbt =

`{text:'{"text":"${text}","color":"${color}"${jsonExtra}}',billboard:"${billboard}",shadow:${shadow},transformation:{translation:[0f,0f,0f],scale:[${size}f,${size}f,${size}f],left_rotation:[0f,0f,0f,1f],right_rotation:[0f,0f,0f,1f]}}`;




let mode=
document.getElementById("mode").value;



if(mode==="summon"){

document.getElementById("output").value=

`/summon minecraft:text_display ~ ~ ~ ${nbt}`;

}

else{

document.getElementById("output").value=

`/data merge entity @e[type=minecraft:text_display,sort=nearest,limit=1] ${nbt}`;

}



}



function copyCommand(){

navigator.clipboard.writeText(

document.getElementById("output").value

);

}



updatePreview();


</script>

</body>
</html>
