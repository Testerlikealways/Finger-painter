<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Text Display Generator</title>

<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    padding:40px;
}

.box{
    width:470px;
    background:#161b22;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 30px #000;
}

h1{
    text-align:center;
    color:#58a6ff;
}

input,select,button,textarea{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#21262d;
    color:white;
}

label{
    display:block;
    margin-top:10px;
}

input[type="checkbox"]{
    width:auto;
}

.preview{
    margin-top:20px;
    background:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
    font-size:40px;
}

button{
    cursor:pointer;
    background:#238636;
    font-weight:bold;
}

.copy{
    background:#1f6feb;
}

textarea{
    height:160px;
    color:#7ee787;
}
</style>
</head>


<body>

<div class="box">

<h1>Text Display Generator</h1>


<input id="text" value="Shop" placeholder="Text">


<select id="color">
<option value="white">White</option>
<option value="gray">Gray</option>
<option value="dark_gray">Dark Gray</option>
<option value="black">Black</option>
<option value="red">Red</option>
<option value="dark_red">Dark Red</option>
<option value="gold">Gold</option>
<option value="yellow">Yellow</option>
<option value="green">Green</option>
<option value="dark_green">Dark Green</option>
<option value="aqua">Aqua</option>
<option value="dark_aqua">Dark Aqua</option>
<option value="blue">Blue</option>
<option value="dark_blue">Dark Blue</option>
<option value="light_purple">Light Purple</option>
<option value="dark_purple">Dark Purple</option>
</select>


<input id="size" type="number" value="2.1" step="0.1">


<label>
<input id="bold" type="checkbox" checked>
Bold
</label>

<label>
<input id="underline" type="checkbox">
Underlined
</label>

<label>
<input id="italic" type="checkbox">
Cursive / Italic
</label>

<label>
<input id="shadow" type="checkbox" checked>
Shadow
</label>


<select id="billboard">
<option value="center">Center</option>
<option value="fixed">Fixed</option>
<option value="vertical">Vertical</option>
<option value="horizontal">Horizontal</option>
</select>


<select id="mode">

<option value="summon">
Summon Text Display
</option>

<option value="merge">
Merge Nearest Text Display
</option>

<option value="shadowon">
Shadow ON (20 blocks)
</option>

<option value="shadowoff">
Shadow OFF (20 blocks)
</option>

</select>


<div class="preview" id="preview">
Shop
</div>


<button onclick="generate()">
Generate
</button>


<button class="copy" onclick="copy()">
Copy Command
</button>


<textarea id="output" readonly></textarea>


</div>



<script>


const mcColors={

white:"#ffffff",
gray:"#aaaaaa",
dark_gray:"#555555",
black:"#000000",
red:"#ff5555",
dark_red:"#aa0000",
gold:"#ffaa00",
yellow:"#ffff55",
green:"#55ff55",
dark_green:"#00aa00",
aqua:"#55ffff",
dark_aqua:"#00aaaa",
blue:"#5555ff",
dark_blue:"#0000aa",
light_purple:"#ff55ff",
dark_purple:"#aa00aa"

};



document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",preview);
e.addEventListener("change",preview);
});



document.getElementById("size").addEventListener("change",function(){
this.value=Number(this.value).toFixed(1);
});



function preview(){

let p=document.getElementById("preview");

p.innerText=document.getElementById("text").value;

p.style.color=
mcColors[document.getElementById("color").value];

p.style.fontWeight=
document.getElementById("bold").checked
?"bold":"normal";

p.style.textDecoration=
document.getElementById("underline").checked
?"underline":"none";

p.style.fontStyle=
document.getElementById("italic").checked
?"italic":"normal";

}



function generate(){

let mode=document.getElementById("mode").value;


if(mode==="shadowon"){

document.getElementById("output").value=
"/data merge entity @e[type=minecraft:text_display,distance=..20] {shadow:1b}";

return;

}


if(mode==="shadowoff"){

document.getElementById("output").value=
"/data merge entity @e[type=minecraft:text_display,distance=..20] {shadow:0b}";

return;

}



let text=document.getElementById("text").value;
let color=document.getElementById("color").value;

let size=
Number(document.getElementById("size").value).toFixed(1);


let extra="";


if(bold.checked)
extra+=',"bold":true';

if(underline.checked)
extra+=',"underlined":true';

if(italic.checked)
extra+=',"italic":true';



let shadow=
shadow.checked
?",shadow:1b"
:",shadow:0b";



let nbt=

`{text:{"text":"${text}","color":"${color}"${extra}},billboard:"${billboard.value}"${shadow},transformation:{translation:[0f,0f,0f],scale:[${size}f,${size}f,${size}f],left_rotation:[0f,0f,0f,1f],right_rotation:[0f,0f,0f,1f]}}`;



if(mode==="summon"){

output.value=
`/summon minecraft:text_display ~ ~ ~ ${nbt}`;

}

else{

output.value=
`/data merge entity @e[type=minecraft:text_display,sort=nearest,limit=1] ${nbt}`;

}


}



function copy(){

navigator.clipboard.writeText(
document.getElementById("output").value
);

}


preview();

</script>

</body>
</html>
