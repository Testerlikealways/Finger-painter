<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>how to date an entity (and not die)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: #111;
      color: #eee;
    }

    h1 {
      margin-bottom: 40px;
    }

    button {
      padding: 15px 35px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #45a049;
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
    }

    .progress-container {
      width: 300px;
      height: 20px;
      background: #333;
      border-radius: 10px;
      margin: 20px auto;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

  <h1>how to date an entity (and not die)</h1>

  <button id="downloadBtn" onclick="startDownload()">Download Guide</button>

  <div id="status"></div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    function startDownload() {
      let countdown = 10;
      const status = document.getElementById("status");
      const btn = document.getElementById("downloadBtn");
      const progressBar = document.getElementById("progressBar");
      const progressContainer = document.getElementById("progressContainer");

      btn.disabled = true;
      progressContainer.style.display = "block";

      status.textContent = "Wait for some seconds...";

      const interval = setInterval(() => {
        status.textContent = "Starting in " + countdown + "...";

        // Update progress bar
        let progress = ((10 - countdown) / 10) * 100;
        progressBar.style.width = progress + "%";

        countdown--;

        if (countdown < 0) {
          clearInterval(interval);
          status.textContent = "Downloading...";
          progressBar.style.width = "100%";

          setTimeout(() => {
            window.open("https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1&pp=ygUJcmljayByb2xsoAcB0gcJCdMKAYcqIYzv", "_blank");
          }, 800);
        }
      }, 1000);
    }
  </script>

</body>
</html>
