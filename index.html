<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herzlichen Glückwunsch zum Muttertag 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@400;700&display=swap');
        
        body {
            font-family: 'Playfair Display', serif;
        }
        
        .title-font {
            font-family: 'Dancing Script', cursive;
        }

        .envelope {
            perspective: 2600px;
            width: 650px;           /* ← Bigger */
            max-width: 95%;
        }

        .flap {
            transition: all 1.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            z-index: 30;
        }

        .envelope.open .flap {
            transform: rotateX(-175deg) !important;
        }

        .seal {
            transition: all 1s ease;
        }

        .envelope.open .seal {
            transform: scale(0.3) translateY(-100px);
            opacity: 0;
        }

        .card {
            position: absolute;
            top: 26%;
            left: 50%;
            width: 89%;
            transform: translate(-50%, 260px) scale(0.68) rotateX(45deg);
            opacity: 0;
            transition: all 1.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.5);
        }

        .envelope.open .card {
            transform: translate(-50%, -155px) scale(1.05) rotateX(5deg);
            opacity: 1;
        }

        .card-content {
            background: white;
            border: 14px solid #fce7f3;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-100 via-pink-50 to-purple-100 min-h-screen flex items-center justify-center">

    <div class="max-w-3xl w-full mx-auto px-4 py-12">
        <div id="envelope" class="envelope relative mx-auto cursor-pointer">
            
            <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border-10 border-rose-200 relative">
                
                <div class="relative h-[540px] bg-gradient-to-b from-rose-50 to-pink-100 overflow-visible">   <!-- ← Bigger height -->
                    
                    <!-- Flap -->
                    <div class="flap absolute top-0 left-0 right-0 h-1/2 bg-gradient-to-br from-rose-400 to-pink-500"
                         style="clip-path: polygon(0% 0%, 50% 75%, 100% 0%)"></div>

                    <!-- Wax Seal -->
                    <div id="seal" class="seal absolute top-20 left-1/2 -translate-x-1/2 w-32 h-32 bg-white rounded-full border-8 border-rose-400 flex items-center justify-center z-40 shadow-2xl">
                        <span class="text-6xl">💖</span>
                    </div>

                    <!-- Card -->
                    <div id="card" class="card rounded-2xl overflow-hidden">
                        <div class="card-content p-10 text-center">
                            <div class="flex justify-center gap-6 mb-6">
                                <i class="fas fa-heart text-5xl text-pink-500"></i>
                                <i class="fas fa-flower text-5xl text-rose-400"></i>
                                <i class="fas fa-heart text-5xl text-pink-500"></i>
                            </div>
                            
                            <h1 class="title-font text-7xl bg-gradient-to-r from-pink-500 to-purple-600 bg-clip-text text-transparent">
                                Muttertag
                            </h1>
                            <p class="text-3xl text-pink-600 mt-1">Herzlichen Glückwunsch!</p>

                            <div class="my-8 border-t border-dashed border-pink-200 pt-6">
                                <p class="text-2xl text-gray-700">Liebe Mama,</p>
                                <p class="text-[18px] leading-relaxed text-gray-600 mt-5">
                                    Danke für deine unendliche Liebe, deine Geduld und dafür, 
                                    dass du immer für mich da bist. Du bist die beste Mama der Welt!
                                </p>
                            </div>

                            <div class="text-4xl title-font text-pink-600 mt-6">
                                Ich hab dich von ganzem Herzen lieb ❤️
                            </div>
                            <p class="mt-8 text-gray-500 font-medium">Dein Kind</p>
                        </div>
                    </div>
                </div>

                <div class="h-28 bg-gradient-to-r from-rose-300 to-pink-400 flex items-center justify-center">
                    <p class="text-white text-xl font-medium">Klicke zum Öffnen</p>
                </div>
            </div>
        </div>

        <p class="text-center mt-10 text-pink-400 text-lg">Für die beste Mama der Welt • 2026 💐</p>
    </div>

    <script>
        const envelope = document.getElementById('envelope');

        envelope.addEventListener('click', () => {
            if (!envelope.classList.contains('open')) {
                envelope.classList.add('open');
                createConfetti();
            }
        });

        function createConfetti() {
            const colors = ['#ec4899','#f43f5e','#c026d3','#e11d48', '#f472b6'];
            for (let i = 0; i < 300; i++) {
                const c = document.createElement('div');
                c.style.position = 'fixed';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-30px';
                c.style.width = Math.random() * 14 + 8 + 'px';
                c.style.height = c.style.width;
                c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                c.style.zIndex = 9999;
                document.body.appendChild(c);

                const dur = Math.random() * 4 + 4;
                c.animate([
                    { transform: 'translateY(0) rotate(0deg)' },
                    { transform: `translateY(${window.innerHeight + 400}px) rotate(${Math.random()*1200 - 600}deg)` }
                ], { duration: dur*1000, easing: 'ease-out' });

                setTimeout(() => c.remove(), dur*1100);
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'm') envelope.classList.add('open');
        });
    </script>
</body>
</html>
